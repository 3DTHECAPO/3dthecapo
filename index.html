<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3D THE CAPO</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <section class="stage" aria-label="3D THE CAPO landing">
      <img class="template" src="assets/template.png" alt="" aria-hidden="true"/>

      <!-- Hotspot links -->
      <a class="hotspot" id="cart" href="#" aria-label="Cart" style="left:73.2422%;top:15.6250%;width:20.9961%;height:4.5573%;"></a>
      <a class="hotspot" id="iconShop" href="#merch" aria-label="Shop" style="left:47.0703%;top:19.5312%;width:3.9062%;height:2.6042%;"></a>
      <a class="hotspot" id="iconMusic" href="#music" aria-label="Music" style="left:51.2695%;top:19.5312%;width:3.9062%;height:2.6042%;"></a>
      <a class="hotspot" id="iconFav" href="#connect" aria-label="Favorites" style="left:55.4688%;top:19.5312%;width:3.9062%;height:2.6042%;"></a>

      <a class="hotspot" id="hero" href="#" aria-label="Hero" style="left:16.1133%;top:22.4609%;width:67.7734%;height:20.7031%;"></a>

      <a class="hotspot" id="shopNow" href="#" aria-label="Shop now" style="left:35.1562%;top:48.8281%;width:17.5781%;height:2.9948%;"></a>
      <a class="hotspot" id="newDropCard" href="#" aria-label="New drop" style="left:29.7852%;top:44.2708%;width:55.6641%;height:13.6719%;"></a>

      <a class="hotspot" id="audio" href="#" aria-label="Audio" style="left:11.7188%;top:59.8958%;width:42.4805%;height:11.3932%;"></a>
      <a class="hotspot" id="video" href="#" aria-label="Video" style="left:54.6875%;top:59.8958%;width:42.4805%;height:12.6953%;"></a>

      <a class="hotspot" id="tee" href="#" aria-label="Tee" style="left:11.7188%;top:72.2656%;width:21.4844%;height:11.7188%;"></a>
      <a class="hotspot" id="hat" href="#" aria-label="Hat" style="left:31.2500%;top:72.2656%;width:21.4844%;height:11.7188%;"></a>
      <a class="hotspot" id="hoodie" href="#" aria-label="Hoodie" style="left:50.7812%;top:72.2656%;width:21.4844%;height:11.7188%;"></a>
      <a class="hotspot" id="chain" href="#" aria-label="Chain" style="left:70.3125%;top:72.2656%;width:21.4844%;height:11.7188%;"></a>

      <!-- Real form (invisible so the screenshot stays identical) -->
      <form id="mailForm" class="hotspot form" style="left:0.0000%;top:0.0000%;width:100.0000%;height:100.0000%;" aria-label="Mailing list">
        <input id="email" class="field" type="email" placeholder="Enter your email" style="left:24.4141%;top:92.4479%;width:41.0156%;height:3.9062%;" required />
        <button id="submit" class="btn" type="submit" style="left:67.3828%;top:92.4479%;width:16.6016%;height:3.9062%;">SUBMIT</button>
      </form>

      <div id="msg" class="msg" aria-live="polite"></div>

      <!-- anchors -->
      <span id="music" class="anchor" style="top:58.5938%"></span>
      <span id="merch" class="anchor" style="top:70.3125%"></span>
      <span id="connect" class="anchor" style="top:91.1458%"></span>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
