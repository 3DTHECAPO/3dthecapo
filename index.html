<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3D THE CAPO — Official</title>
  <meta name="description" content="3D THE CAPO — music + merch" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Oswald:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="noise" aria-hidden="true"></div>

  <div class="page">
    <header class="header">
      <div class="header-row">
        <img class="logo" src="assets/header_logo.jpg" alt="3D THE CAPO" />
        <a class="cart" href="#merch" aria-label="Cart">CART (0) <span class="caret">▾</span></a>
      </div>

      <div class="tagline">Hustle, Grind, Dominate.</div>

      <div class="mini-icons" aria-label="Quick navigation">
        <a class="mini" href="#merch" title="Shop">🛍️</a>
        <a class="mini" href="#music" title="Music">🎵</a>
        <a class="mini" href="#mail" title="Mailing list">❤</a>
      </div>
    </header>

    <section class="hero">
      <div class="frame hero-frame">
        <img src="assets/hero.jpg" alt="Hero banner" />
        <div class="hero-text">YOUR IMAGE HERE</div>
      </div>
    </section>

    <section class="drop">
      <div class="frame drop-frame">
        <div class="drop-left">
          <div class="drop-title">NEW DROP</div>
          <div class="drop-sub">OUT NOW</div>
          <a class="btn-gold" href="#merch">SHOP NOW</a>
        </div>
        <a class="drop-right" href="#music" aria-label="Go to music">
          <img src="assets/drop.jpg" alt="Drop artwork" />
        </a>
      </div>
    </section>

    <div class="section-title">
      <span class="line"></span><span class="title">LATEST MUSIC</span><span class="line"></span>
    </div>

    <section class="music" id="music">
      <div class="frame music-frame">
        <div class="music-grid">
          <div class="embed">
            <div class="embed-head">AUDIO</div>
            <div class="embed-body">
              <div class="embed-big">SPOTIFY / SOUNDCLOUD EMBED</div>
              <div class="embed-small">Paste your iframe here later.</div>
            </div>
            <div class="embed-actions">
              <a class="btn" href="https://open.spotify.com/user/31thbrqw3vygxmwfhni7zaa5qxqa?si=0kWc6No5TjSkKP8Fc-lp0w" target="_blank" rel="noopener">Spotify</a>
              <a class="btn" href="https://music.youtube.com/channel/UCM6GW8j7HMhcPAplgV5Ca4A?si=SxLuzKyyerdefz9a" target="_blank" rel="noopener">YT Music</a>
            </div>
          </div>

          <div class="embed">
            <div class="embed-head">VIDEO</div>
            <div class="ratio">
              <iframe
                title="YouTube Channel"
                src="https://www.youtube.com/embed?listType=user_uploads&list=@iiidtv"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
              </iframe>
            </div>
            <div class="embed-actions">
              <a class="btn" href="https://youtube.com/@iiidtv?si=xuHENlrbF27-2Z1x" target="_blank" rel="noopener">YouTube</a>
              <a class="btn" href="https://www.instagram.com/3d_the_capo?igsh=NTc4MTIwNjQ2YQ%3D%3D&utm_source=qr" target="_blank" rel="noopener">Instagram</a>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="section-title">
      <span class="line"></span><span class="title">SHOP THE MERCH</span><span class="line"></span>
    </div>

    <section class="merch" id="merch">
      <div class="merch-grid">
        <a class="merch-item frame" href="#" aria-label="Tee"><img src="assets/tee.jpg" alt="Tee"></a>
        <a class="merch-item frame" href="#" aria-label="Hat"><img src="assets/hat.jpg" alt="Hat"></a>
        <a class="merch-item frame" href="#" aria-label="Hoodie"><img src="assets/hoodie.jpg" alt="Hoodie"></a>
        <a class="merch-item frame" href="#" aria-label="Chain"><img src="assets/chain.jpg" alt="Chain"></a>
      </div>
    </section>

    <div class="section-title">
      <span class="line"></span><span class="title">STAY CONNECTED</span><span class="line"></span>
    </div>

    <section class="mail" id="mail">
      <div class="mail-sub">JOIN THE MAILING LIST</div>
      <form class="mail-form frame" id="mailForm">
        <input class="mail-input" type="email" name="email" placeholder="Enter your email" required />
        <button class="mail-btn" type="submit">SUBMIT</button>
      </form>
      <div class="mail-note" id="mailNote"></div>
    </section>

    <footer class="footer">
      © <span id="year"></span> 3D THE CAPO
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
