<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>3D THE CAPO • Logout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/public/shared/styles.css">
</head>
<body>
  <main class="shell">
    <section class="card">
      <div class="hero">
        <div class="hero-title">Vault Pass</div>
        <div class="hero-sub">SIGNED OUT</div>
      </div>
      <div class="status">
        <div class="status-kicker">Status</div>
        <div class="status-text ok">PASS CLEARED</div>
        <div class="status-sub">Your local vault pass has been removed from this device.</div>
      </div>
      <div style="margin-top:14px">
        <a class="btn-link" href="/nfc/index.html">Return To Vault</a>
      </div>
    </section>
  </main>
  <script src="/public/shared/config.js"></script>
  <script src="/public/shared/pass-session.js"></script>
  <script>
    if(window.Play3DPassSession){ Play3DPassSession.clear(); }
  </script>
</body>
</html>
