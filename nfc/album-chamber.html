<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Album Chamber</title>
  <link rel="stylesheet" href="./nfc.css">
  <link rel="stylesheet" href="./vault-polish.css">
  <style>
    body{
      background:
        linear-gradient(180deg, rgba(0,0,0,.20), rgba(0,0,0,.20)),
        url("./assets/album_chamber.jpg") center/cover fixed no-repeat;
    }
    .page-wrap{width:min(1180px,92vw);margin:0 auto;padding:18px 0 56px}
    .page-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    @media (max-width:980px){.page-grid{grid-template-columns:1fr}}
  </style>
</head>
<body class="room-cinematic room-album">
  <div class="noise"></div>
  <div class="page-wrap">
    <header class="topbar">
      <a class="logo-link" href="./index.html"><img class="logo" src="./assets/vault_stamp_gold.png" alt="Vault Seal"></a>
      <a class="back-btn" href="./index.html">Back To Vault</a>
    </header>
    <section class="page-card" style="padding:22px">
      <div class="eyebrow">Gold Room</div>
      <h1>Album Chamber</h1>
      <p>The album chamber holds your deeper music lane, visuals, and premium access moments.</p>
      <div class="action-row" style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap">
        <a class="btn gold" href="https://open.spotify.com/artist/4R7uJYf4ts6pthecl9IVBF?si=GoMcEWQASFKnyKxKfnAFWg">Open Spotify</a>
        <a class="btn" href="./index.html">Back To Vault</a>
      </div>
    </section>
    <section class="page-grid">
      <div class="page-card" style="padding:18px"><h3>Music</h3><p>Add your album embeds or private tracks here.</p></div>
      <div class="page-card" style="padding:18px"><h3>Video</h3><p>Add your visual lane, trailers, or release clips here.</p></div>
    </section>
  </div>
</body>
</html>
