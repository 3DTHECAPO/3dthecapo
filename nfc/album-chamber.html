
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Album Chamber</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Cinzel:wght@600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;color:#f3efe8;font-family:Oswald,Arial,sans-serif;
      background:
        linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,.88)),
        url("./assets/album_chamber.jpg") center/cover fixed no-repeat;
      min-height:100vh;
    }
    .wrap{width:min(1200px,92vw);margin:0 auto;padding:24px 0 60px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .logo{width:150px;filter:drop-shadow(0 0 12px rgba(210,168,70,.35))}
    .btn{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:10px 16px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);text-decoration:none;color:#f3efe8;text-transform:uppercase;letter-spacing:1px;font-family:'Black Ops One',sans-serif}
    .hero{margin-top:24px;border:1px solid rgba(255,255,255,.14);border-radius:24px;overflow:hidden;background:rgba(0,0,0,.45);box-shadow:0 24px 80px rgba(0,0,0,.55)}
    .pane{min-height:72vh;display:flex;align-items:flex-end;padding:42px;background:linear-gradient(180deg, rgba(0,0,0,.04), rgba(0,0,0,.72))}
    .card{max-width:720px;background:rgba(0,0,0,.52);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.10);border-radius:22px;padding:24px;box-shadow:0 18px 70px rgba(0,0,0,.5)}
    .eyebrow{font-size:12px;letter-spacing:2px;color:rgba(243,239,232,.7);text-transform:uppercase}
    h1{margin:8px 0 10px;font-family:'Cinzel',serif;font-size:clamp(34px,6vw,72px);line-height:.95;text-transform:uppercase}
    p{margin:0;color:rgba(243,239,232,.8);font-size:17px;line-height:1.55}
    .chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
    .chip{padding:8px 12px;border-radius:999px;border:1px solid rgba(210,168,70,.35);color:#d2a74f;background:rgba(255,255,255,.04);font-size:12px;letter-spacing:1px;text-transform:uppercase}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a href="./index.html"><img class="logo" src="./assets/vault_stamp_gold.png" alt="Vault Seal"></a>
      <a class="btn" href="./index.html">Back to Vault</a>
    </div>
    <section class="hero">
      <div class="pane">
        <div class="card">
          <div class="eyebrow">Private vault add-on</div>
          <h1>Album Chamber</h1>
          <p>Private chamber built for album previews, hidden tracks, and exclusive release-world storytelling.</p>
          <div class="chips"><span class="chip">album preview</span><span class="chip">exclusive music</span><span class="chip">release chamber</span></div>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
