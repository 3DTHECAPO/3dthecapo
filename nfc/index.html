<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <base href="./" />
  <title>3D THE CAPO — Vault Scan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./capo-guide.css" />
  <style>
    :root{
      --gold:#f4c66f;
      --gold2:#9b6b22;
      --red:#b40018;
      --green:#00ff88;
      --cream:#f7ead4;
      --black:#050403;
    }

    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:#000;color:var(--cream);font-family:Oswald,Arial,sans-serif;overflow:hidden}
    body.unlocked{overflow:hidden}

    .scan-stage{
      position:relative;
      width:100vw;
      height:100vh;
      isolation:isolate;
      display:grid;
      place-items:center;
      background:#000;
    }

    .door-bg{
      position:absolute;
      inset:0;
      background:url('./assets/capo_vault_door.jpg') center center / cover no-repeat;
      transform:scale(1.02);
      filter:brightness(.72) contrast(1.12) saturate(1.05);
      z-index:0;
    }

    .dark-vignette{
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at center, rgba(0,0,0,.04) 0%, rgba(0,0,0,.28) 45%, rgba(0,0,0,.88) 100%),
        linear-gradient(180deg, rgba(0,0,0,.64), rgba(0,0,0,.1) 45%, rgba(0,0,0,.8));
      z-index:1;
      pointer-events:none;
    }

    .scan-lines{
      position:absolute;
      inset:0;
      z-index:2;
      background:repeating-linear-gradient(0deg, rgba(255,255,255,.035), rgba(255,255,255,.035) 1px, transparent 1px, transparent 7px);
      opacity:.35;
      mix-blend-mode:screen;
      pointer-events:none;
    }

    .scanner-beam{
      position:absolute;
      left:-15vw;
      right:-15vw;
      top:-10%;
      height:3px;
      background:linear-gradient(90deg, transparent, rgba(255,0,38,.15), rgba(255,0,38,.95), rgba(255,210,120,.75), rgba(255,0,38,.95), rgba(255,0,38,.15), transparent);
      box-shadow:0 0 18px rgba(255,0,35,.9), 0 0 38px rgba(244,198,111,.28);
      z-index:3;
      animation:beamScan 2.15s linear infinite;
      pointer-events:none;
    }
    @keyframes beamScan{0%{transform:translateY(-10vh);opacity:0}12%{opacity:1}88%{opacity:1}100%{transform:translateY(120vh);opacity:0}}

    .interface{
      position:relative;
      z-index:5;
      width:min(430px, calc(100vw - 32px));
      padding:22px;
      border:1px solid rgba(244,198,111,.35);
      border-radius:18px;
      background:rgba(6,5,4,.76);
      box-shadow:0 18px 70px rgba(0,0,0,.75), inset 0 0 0 1px rgba(255,255,255,.04);
      backdrop-filter:blur(8px);
      text-align:center;
    }

    .brand{
      font-family:'Black Ops One', Impact, sans-serif;
      letter-spacing:.08em;
      font-size:clamp(26px, 7vw, 42px);
      color:var(--gold);
      text-shadow:0 0 12px rgba(244,198,111,.34), 0 4px 0 rgba(0,0,0,.9);
      margin:0 0 6px;
    }
    .sub{margin:0 0 16px;color:rgba(247,234,212,.76);letter-spacing:.16em;font-size:13px;text-transform:uppercase}

    .lock-ring{
      width:126px;height:126px;margin:10px auto 16px;border-radius:50%;
      border:2px solid rgba(244,198,111,.5);
      display:grid;place-items:center;position:relative;
      box-shadow:0 0 24px rgba(244,198,111,.18), inset 0 0 30px rgba(0,0,0,.65);
    }
    .lock-ring:before,.lock-ring:after{content:"";position:absolute;inset:-8px;border-radius:50%;border:1px solid rgba(180,0,24,.5);animation:ringSpin 5s linear infinite}
    .lock-ring:after{inset:10px;border-color:rgba(244,198,111,.2);animation-direction:reverse;animation-duration:3.8s}
    @keyframes ringSpin{to{transform:rotate(360deg)}}
    .lock-icon{font-size:52px;filter:drop-shadow(0 0 10px rgba(244,198,111,.45))}

    .status{min-height:24px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:#ddd;margin:4px 0 14px}
    .status.ok{color:var(--green);text-shadow:0 0 14px rgba(0,255,136,.65)}
    .status.bad{color:#ff4055;text-shadow:0 0 14px rgba(255,30,60,.65)}

    .code-row{display:flex;gap:10px;margin-top:12px}
    input{
      flex:1;min-width:0;border:1px solid rgba(244,198,111,.32);border-radius:10px;background:#090705;color:var(--cream);
      padding:12px 13px;font:700 16px Oswald,Arial,sans-serif;outline:none;text-transform:uppercase;letter-spacing:.08em;
    }
    input:focus{border-color:rgba(244,198,111,.9);box-shadow:0 0 0 3px rgba(244,198,111,.12)}
    button.enter{
      border:1px solid rgba(244,198,111,.55);border-radius:10px;background:linear-gradient(180deg, #c99027, #5b350e);color:#120b04;
      padding:0 16px;font:900 14px Oswald,Arial,sans-serif;letter-spacing:.08em;cursor:pointer;min-width:84px;
    }

    .hint{font-size:12px;line-height:1.45;color:rgba(247,234,212,.62);margin:14px 0 0}

    .access-flash{
      position:absolute;inset:0;z-index:8;display:grid;place-items:center;background:rgba(0,0,0,.78);opacity:0;pointer-events:none;
      transition:opacity .25s ease;
    }
    .access-flash.show{opacity:1}
    .access-box{font-family:'Black Ops One',Impact,sans-serif;color:var(--green);font-size:clamp(32px,9vw,76px);letter-spacing:.09em;text-align:center;text-shadow:0 0 16px rgba(0,255,136,.9),0 0 38px rgba(0,255,136,.45);animation:accessPulse .45s ease infinite alternate}
    @keyframes accessPulse{from{transform:scale(1)}to{transform:scale(1.035)}}

    .door-bg.opening{animation:doorOpen 1.45s cubic-bezier(.12,.8,.2,1) forwards}
    @keyframes doorOpen{0%{transform:scale(1.02);filter:brightness(.72) contrast(1.12)}45%{transform:scale(1.12) rotate(.35deg);filter:brightness(1.05) contrast(1.22)}100%{transform:scale(2.15) rotate(1deg);opacity:0;filter:brightness(1.8) blur(8px)}}
    .interface.fade-out{animation:fadeOut .6s ease forwards}
    @keyframes fadeOut{to{opacity:0;transform:translateY(18px) scale(.96);filter:blur(5px)}}

    @media(max-width:520px){.interface{padding:18px}.code-row{flex-direction:column}button.enter{height:44px}}
  </style>
</head>
<body>
  <main class="scan-stage" aria-label="CAPO VAULT scanner">
    <div class="door-bg" id="doorBg"></div>
    <div class="dark-vignette"></div>
    <div class="scan-lines"></div>
    <div class="scanner-beam" id="scannerBeam"></div>

    <section class="interface" id="interface">
      <h1 class="brand">CAPO VAULT</h1>
      <p class="sub">Tap merch or enter code</p>
      <div class="lock-ring"><div class="lock-icon" id="lockIcon">🔒</div></div>
      <div class="status" id="status">SCANNING...</div>
      <form class="code-row" id="codeForm">
        <input id="codeInput" autocomplete="one-time-code" placeholder="ENTER CODE" />
        <button class="enter" type="submit">ENTER</button>
      </form>
      <p class="hint">This page replaces <b>scan.html</b>. Route NFC links here: <b>/nfc/index.html?code=ENTRY101</b></p>
    </section>

    <div class="access-flash" id="accessFlash"><div class="access-box">ACCESS<br>GRANTED</div></div>
  </main>

  <script src="./capo-guide.js"></script>
  <script>
    (function(){
      'use strict';

      const params = new URLSearchParams(window.location.search);
      const urlCode = (params.get('code') || '').trim();
      const codeInput = document.getElementById('codeInput');
      const codeForm = document.getElementById('codeForm');
      const status = document.getElementById('status');
      const lockIcon = document.getElementById('lockIcon');
      const accessFlash = document.getElementById('accessFlash');
      const doorBg = document.getElementById('doorBg');
      const ui = document.getElementById('interface');

      if(urlCode){
        codeInput.value = urlCode.toUpperCase();
        runUnlock(urlCode);
      }else{
        setTimeout(() => setStatus('ENTER CODE', ''), 900);
      }

      codeForm.addEventListener('submit', function(e){
        e.preventDefault();
        const code = (codeInput.value || '').trim().toUpperCase();
        if(!code){
          setStatus('CODE REQUIRED', 'bad');
          return;
        }
        runUnlock(code);
      });

      function setStatus(text, mode){
        status.textContent = text;
        status.className = 'status' + (mode ? ' ' + mode : '');
      }

      function runUnlock(code){
        codeInput.value = code.toUpperCase();
        codeInput.disabled = true;
        codeForm.querySelector('button').disabled = true;

        setStatus('SCANNING...', '');
        setTimeout(() => setStatus('VALIDATING...', ''), 900);

        setTimeout(() => {
          // Later this is where Supabase validation goes.
          lockIcon.textContent = '🔓';
          setStatus('ACCESS GRANTED', 'ok');
          accessFlash.classList.add('show');
        }, 1900);

        setTimeout(() => {
          ui.classList.add('fade-out');
          doorBg.classList.add('opening');
        }, 2800);

        setTimeout(() => {
          window.location.href = './vault.html?code=' + encodeURIComponent(code.toUpperCase());
        }, 4300);
      }
    })();
  </script>
</body>
</html>
