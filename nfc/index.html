<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3D THE CAPO — NFC Scan</title>
<link rel="stylesheet" href="./capo-guide.css">
<style>
:root{
  --gold:#f4c66f;
  --red:#ff1717;
  --green:#00ff88;
}
*{box-sizing:border-box}
html,body{
  margin:0;
  min-height:100%;
  background:#000;
  color:#fff;
  font-family:Arial,Helvetica,sans-serif;
}
body{
  overflow:hidden;
}
.vault-scene{
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(0,0,0,.32),rgba(0,0,0,.72)),
    url("./assets/capo_vault_door.jpg") center/cover no-repeat;
  transform:scale(1);
  transition:transform 1.6s ease, filter 1.6s ease;
}
.vault-scene.opening{
  transform:scale(1.22);
  filter:brightness(1.18) contrast(1.08);
}
.scan-layer{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
  z-index:5;
}
.scan-card{
  width:min(430px,92vw);
  min-height:390px;
  position:relative;
  overflow:hidden;
  border:1px solid rgba(244,198,111,.42);
  border-radius:18px;
  background:rgba(5,4,3,.72);
  box-shadow:0 24px 80px rgba(0,0,0,.68), inset 0 0 40px rgba(244,198,111,.06);
  backdrop-filter:blur(5px);
  text-align:center;
  padding:28px 20px;
}
.scan-card:before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:18px;
  pointer-events:none;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.05);
}
.scan-line{
  position:absolute;
  left:-5%;
  width:110%;
  height:4px;
  top:0;
  background:linear-gradient(90deg,transparent,rgba(255,0,0,.2),var(--red),rgba(255,0,0,.2),transparent);
  box-shadow:0 0 14px var(--red), 0 0 36px rgba(255,0,0,.65);
  animation:scanMove 2.15s linear infinite;
}
@keyframes scanMove{
  0%{top:0;opacity:0}
  12%{opacity:1}
  88%{opacity:1}
  100%{top:100%;opacity:0}
}
.brand{
  margin-top:20px;
  letter-spacing:.18em;
  color:var(--gold);
  font-weight:900;
  font-size:14px;
}
.lock-ring{
  width:132px;
  height:132px;
  border-radius:50%;
  margin:28px auto 20px;
  border:1px solid rgba(244,198,111,.36);
  display:grid;
  place-items:center;
  position:relative;
  box-shadow:0 0 36px rgba(244,198,111,.12);
}
.lock-ring:before{
  content:"";
  position:absolute;
  inset:10px;
  border-radius:50%;
  border:1px dashed rgba(244,198,111,.36);
  animation:spin 9s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.lock-icon{
  font-size:54px;
  filter:drop-shadow(0 0 18px rgba(244,198,111,.35));
}
.title{
  font-size:28px;
  letter-spacing:.12em;
  font-weight:900;
  margin:0;
}
.status{
  color:#cfc2aa;
  letter-spacing:.2em;
  font-size:12px;
  margin-top:14px;
}
.code-row{
  display:flex;
  gap:8px;
  margin:22px auto 0;
  max-width:330px;
}
.code-row input{
  flex:1;
  min-width:0;
  height:44px;
  border:1px solid rgba(244,198,111,.38);
  background:#090806;
  color:#fff;
  border-radius:9px;
  padding:0 12px;
  outline:none;
  text-transform:uppercase;
}
.code-row button{
  height:44px;
  border:1px solid rgba(244,198,111,.65);
  background:linear-gradient(180deg,#f4c66f,#9b6b20);
  color:#050403;
  border-radius:9px;
  font-weight:900;
  cursor:pointer;
}
.message{
  min-height:22px;
  margin-top:14px;
  font-size:13px;
  color:#bfbfbf;
}
.access-granted{
  display:none;
  margin-top:18px;
  color:var(--green);
  font-size:22px;
  letter-spacing:.18em;
  font-weight:900;
  text-shadow:0 0 20px rgba(0,255,136,.62);
}
.scan-layer.done{
  animation:fadeOut .7s ease forwards;
  animation-delay:.9s;
}
@keyframes fadeOut{to{opacity:0;visibility:hidden}}
.flash{
  position:fixed;
  inset:0;
  z-index:4;
  background:rgba(244,198,111,0);
  pointer-events:none;
}
.flash.active{
  animation:flash .55s ease;
}
@keyframes flash{
  0%{background:rgba(255,255,255,.7)}
  100%{background:rgba(244,198,111,0)}
}
@media(max-width:520px){
  .scan-card{min-height:360px;padding:24px 16px}
  .title{font-size:23px}
  .code-row{flex-direction:column}
  .code-row button{width:100%}
}
</style>
</head>
<body>
<div class="vault-scene" id="vaultScene"></div>
<div class="flash" id="flash"></div>

<main class="scan-layer" id="scanLayer">
  <section class="scan-card">
    <div class="scan-line"></div>
    <div class="brand">3D THE CAPO</div>
    <div class="lock-ring"><div class="lock-icon">🔒</div></div>
    <h1 class="title">CAPO VAULT</h1>
    <div class="status" id="status">SCANNING...</div>

    <form class="code-row" id="codeForm">
      <input id="codeInput" autocomplete="off" placeholder="ENTER CODE">
      <button type="submit">UNLOCK</button>
    </form>

    <div class="message" id="message">Tap merch or enter your vault code.</div>
    <div class="access-granted" id="accessGranted">ACCESS GRANTED</div>
  </section>
</main>

<script src="./capo-guide.js"></script>
<script>
(function(){
  const params = new URLSearchParams(location.search);
  const urlCode = params.get("code") || "";
  const codeInput = document.getElementById("codeInput");
  const form = document.getElementById("codeForm");
  const status = document.getElementById("status");
  const message = document.getElementById("message");
  const access = document.getElementById("accessGranted");
  const scanLayer = document.getElementById("scanLayer");
  const scene = document.getElementById("vaultScene");
  const flash = document.getElementById("flash");

  if(urlCode){
    codeInput.value = urlCode;
    setTimeout(()=>startUnlock(urlCode), 900);
  }else{
    status.textContent = "WAITING FOR CODE";
  }

  form.addEventListener("submit", function(e){
    e.preventDefault();
    const manualCode = codeInput.value.trim();
    if(!manualCode){
      message.textContent = "Enter a code first.";
      return;
    }
    startUnlock(manualCode);
  });

  function startUnlock(code){
    code = String(code || "").trim();
    if(!code){
      status.textContent = "NO CODE";
      message.textContent = "Missing vault code.";
      return;
    }

    // Keep Supabase-compatible query param flow.
    // Later, real Supabase validation can replace this success block.
    status.textContent = "VALIDATING...";
    message.textContent = "Checking vault access...";
    form.style.pointerEvents = "none";
    form.style.opacity = ".55";

    setTimeout(()=>{
      status.textContent = "ACCESS VERIFIED";
      message.textContent = "Vault door opening...";
      access.style.display = "block";
      flash.classList.add("active");
    }, 1200);

    setTimeout(()=>{
      scene.classList.add("opening");
      scanLayer.classList.add("done");
    }, 2100);

    setTimeout(()=>{
      location.href = "./vault.html?code=" + encodeURIComponent(code);
    }, 3900);
  }
})();
</script>
</body>
</html>
