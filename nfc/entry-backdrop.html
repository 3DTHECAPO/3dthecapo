<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entry Chamber</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./nfc.css">
  <style>
    body{background:linear-gradient(180deg, rgba(0,0,0,.46), rgba(0,0,0,.88)), url("./assets/entry_backdrop.jpg") center/cover fixed no-repeat}
    .page-wrap{width:min(1180px,92vw);margin:0 auto;padding:18px 0 56px;position:relative;z-index:2}
    .page-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .topbar{gap:14px;align-items:center}
    .topbar .action-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;align-items:center}
    .topbar .back-btn{white-space:nowrap}
    @media (max-width:980px){.page-grid{grid-template-columns:1fr}.topbar{align-items:flex-start}.topbar .action-row{width:100%;justify-content:flex-start}.topbar .back-btn{flex:1 1 auto;text-align:center}}
  </style>
  <script src="./shared/access-bridge.js"></script>
  <script>
    (function(){
      if(window.Play3DAccess && window.Play3DAccess.requireTier('entry',{redirect:true})) return;
    })();
  </script>
</head>
<body>
  <div class="cinematic-overlay" aria-hidden="true">
    <div class="cinematic-fog-back"></div>
    <div class="cinematic-glow"></div>
    <div class="cinematic-particles"></div>
    <div class="cinematic-fog-front"></div>
    <div class="cinematic-vignette"></div>
  </div>
  <div class="noise" aria-hidden="true"></div>
  <div class="page-wrap">
    <header class="topbar">
      <a class="logo-link" href="./index.html"><img class="logo" src="./assets/vault_stamp_gold.png" alt="Vault Seal"></a>
      <div class="action-row">
        <a class="back-btn" href="./scan.html">Back To Vault</a>
        <a class="back-btn" href="../index.html">Main Site</a>
        <a class="back-btn" href="./game-vault/index.html">Game Vault</a>
      </div>
    </header>
    <section class="page-card">
      <div class="eyebrow">Private Chamber</div>
      <h1>Entry Chamber</h1>
      <p>The first vault chamber for early access music and visual discovery.</p>
      <div class="action-row" style="margin-top:16px"><a class="btn gold" href="https://youtube.com/@iiidtv">Watch Channel</a></div>
    </section>
    <section class="page-grid">
      <div class="page-card">
        <h3>Music</h3>
        <div class="embed-frame"><iframe style="border-radius:12px" src="https://open.spotify.com/embed/artist/4R7uJYf4ts6pthecl9IVBF?utm_source=generator&theme=0" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe></div>
      </div>
      <div class="page-card">
        <h3>Video</h3>
        <div class="video-card"><iframe src="https://www.youtube.com/embed/sroTF0qw92k" title="3D THE CAPO video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen loading="lazy"></iframe></div>
      </div>
    </section>
  </div>
</body>
</html>
