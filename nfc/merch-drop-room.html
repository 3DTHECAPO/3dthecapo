<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Merch Drop Room</title>
  <link rel="stylesheet" href="./nfc.css">
  <link rel="stylesheet" href="./vault-polish.css">
  <style>
    body{
      background:
        linear-gradient(180deg, rgba(0,0,0,.20), rgba(0,0,0,.20)),
        url("./assets/merch_drop_room.jpg") center/cover fixed no-repeat;
    }
    .page-wrap{width:min(1180px,92vw);margin:0 auto;padding:18px 0 56px}
    .product-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    @media (max-width:980px){.product-grid{grid-template-columns:1fr}}
  </style>
</head>
<body class="room-cinematic room-merch merch-stage">
  <div class="noise"></div>
  <div class="page-wrap">
    <header class="topbar">
      <a class="logo-link" href="./index.html"><img class="logo" src="./assets/vault_stamp_gold.png" alt="Vault Seal"></a>
      <a class="back-btn" href="./index.html">Back To Vault</a>
    </header>
    <section class="page-card" style="padding:22px">
      <div class="eyebrow">Vault Exclusive</div>
      <h1>Merch Drop Room</h1>
      <p>This page previews the merch lane and routes deeper into the exclusive merch vault.</p>
      <div class="action-row" style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap">
        <a class="btn gold" href="./exclusive-merch-vault.html">Open Merch Vault</a>
        <a class="btn" href="./index.html">Back To Vault</a>
      </div>
    </section>
    <section class="product-grid" style="margin-top:16px">
      <article class="product-card"><img src="./assets/merch_hat.jpg" alt="Cap"><div class="product-body" style="padding:16px"><h4>Cap</h4><p>Vault Preview</p></div></article>
      <article class="product-card"><img src="./assets/merch_hoodie.jpg" alt="Hoodie"><div class="product-body" style="padding:16px"><h4>Hoodie</h4><p>Vault Preview</p></div></article>
      <article class="product-card"><img src="./assets/merch_shirt.jpg" alt="Shirt"><div class="product-body" style="padding:16px"><h4>Shirt</h4><p>Vault Preview</p></div></article>
    </section>
  </div>
</body>
</html>
