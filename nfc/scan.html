<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Redirecting to Vault</title>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    if (code) {
      window.location.replace("./index.html?code=" + encodeURIComponent(code));
    } else {
      window.location.replace("./index.html");
    }
  </script>
</head>
<body>
  <p style="background:#000;color:#f2d27b;font-family:Arial;padding:20px;">
    Loading vault...
  </p>
</body>
</html>
