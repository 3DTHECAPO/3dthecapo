<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>PLAY 3D REWARDS - Members Only</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <script src="/public/shared/config.js"></script>
  <script src="/public/shared/pass-session.js"></script>
  <script src="/public/shared/room-guard.js"></script>
  <script>
    Play3DRoomGuard.requireMemberOrPass();
  </script>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <button class="back" type="button" onclick="history.back()">← Back</button>
      <div class="headcopy">
        <div class="kicker">3D THE CAPO</div>
        <div class="title">Rewards</div>
      </div>
    </header><nav class="vault-main-nav"><a href="/nfc/index.html">Vault</a><a href="/nfc/scan.html">Scan</a><a href="/nfc/game-vault/index.html">Game</a><a href="/nfc/game-vault/rewards/index.html">Rewards</a></nav>
    

    <section class="panel summary-panel">
      <div class="summary-grid">
        <div class="stat">
          <span class="label">Rewards</span>
          <div class="value" id="totalRewardsValue">0</div>
        </div>
        <div class="stat">
          <span class="label">Unclaimed</span>
          <div class="value" id="unclaimedRewardsValue">0</div>
        </div>
        <div class="stat">
          <span class="label">Claimed</span>
          <div class="value" id="claimedRewardsValue">0</div>
        </div>
      </div>
    </section>

    <section class="panel filters-panel">
      <div class="filter-row">
        <button class="filter-btn active" data-filter="all" type="button">All</button>
        <button class="filter-btn" data-filter="unclaimed" type="button">Unclaimed</button>
        <button class="filter-btn" data-filter="claimed" type="button">Claimed</button>
      </div>
    </section>

    <section class="panel actions-panel">
      <div class="actions-grid">
        <button class="action-btn gold" id="exportBtn" type="button">Export</button>
        <button class="action-btn dark" id="clearClaimedBtn" type="button">Clear Claimed</button>
      </div>
      <p class="note">Vault rewards, prize codes, and member perks live here. Claim available drops and copy your reward code.</p>
    </section>

    <section class="wallet-list" id="walletList"></section>

    <template id="rewardCardTemplate">
      <article class="reward-card">
        <div class="reward-head">
          <div>
            <div class="reward-name"></div>
            <div class="reward-meta"></div>
          </div>
          <div class="reward-badge"></div>
        </div>
        <div class="reward-body">
          <div class="reward-desc"></div>
          <div class="reward-code"></div>
          <div class="reward-extra"></div>
        </div>
        <div class="reward-actions">
          <button class="action-btn gold claim-btn" type="button">Claim</button>
          <button class="action-btn dark copy-btn" type="button">Copy Code</button>
        </div>
      </article>
    </template>
  </main>
  <script src="./script.js"></script>
</body>
</html>
