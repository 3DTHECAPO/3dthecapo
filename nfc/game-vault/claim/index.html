<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Claim Credits - Members Only</title>
  <link rel="stylesheet" href="./style.css">
  <script src="../../../public/shared/config.js"></script>
  <script src="../../../public/shared/pass-session.js"></script>
  <script src="../../../public/shared/room-guard.js"></script>
  <script>
    Play3DRoomGuard.requireMemberOrPass();
  </script>
</head>
<body>
  <main class="app">
    <section class="card">
      <h1>Rewards Claim</h1>

      <input id="claimCodeInput" type="text" aria-label="Claim code">

      <button id="claimBtn" class="btn gold">Claim Credits</button>

      <a id="playBtn" href="../index.html" class="btn gold" style="display:none;margin-top:10px;text-align:center;text-decoration:none;">
        PLAY GAMES
      </a>

      <div id="statusBox">READY</div>
    </section>
  </main>

  <script src="../rewards/bankroll.js"></script>
  <script src="../member-system.js"></script>
  <script src="./claim.js"></script>
  <script>
    (function(){
      const params = new URLSearchParams(window.location.search);
      const code = String(params.get('code') || '').trim().toUpperCase();
      const auto = params.get('auto') === '1';
      if(!code) return;
      const input = document.getElementById('claimCodeInput');
      const button = document.getElementById('claimBtn');
      if(input) input.value = code;
      if(auto && button){
        setTimeout(function(){ button.click(); }, 120);
      }
    })();
  </script>
</body>
</html>
