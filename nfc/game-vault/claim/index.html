<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Claim Credits</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app">
    <section class="card">
      <div class="kicker">3D THE CAPO</div>
      <h1>CREDIT CLAIM</h1>
      <p class="sub">Use your claim link or enter your boost code to add play credits to this device.</p>

      <div class="panel">
        <label class="label" for="claimCodeInput">Boost Code</label>
        <input id="claimCodeInput" type="text" placeholder="BOOST-5000-AB12CD">
        <button id="claimBtn" class="btn gold" type="button">Claim Credits</button>
      </div>

      <div class="panel">
        <div class="mini-label">Status</div>
        <div id="statusBox" class="status">READY</div>
      </div>

      <div class="panel">
        <div class="mini-label">What this does</div>
        <div class="explain">
          Adds credits to this device for your games. Each valid claim code can only be used once on this browser.
        </div>
      </div>
    </section>
  </main>
  <script src="../rewards/bankroll.js"></script>
  <script src="./claim.js"></script>
</body>
</html>
