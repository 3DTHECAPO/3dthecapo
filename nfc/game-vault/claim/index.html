<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Claim Credits - Members Only</title>
  <link rel="stylesheet" href="./style.css">
  <script src="/public/shared/config.js"></script>
  <script src="/public/shared/pass-session.js"></script>
  <script>
    (function(){
      function hasMemberAccess(){
        try{
          if(localStorage.getItem('play3d_member_v1') === '1') return true;
        }catch(e){}

        if(window.Play3DPassSession && Play3DPassSession.current()){
          return true;
        }

        return false;
      }

      if(!hasMemberAccess()){
        location.replace('/nfc/scan.html');
      }
    })();
  </script>
</head>
<body>
  <main class="app">
    <section class="card">
      <h1>Rewards Claim (Members Only)</h1>

      <input id="claimCodeInput" type="text" placeholder="BOOST-5000-XXXX">

      <button id="claimBtn" class="btn gold">Claim Credits</button>

      <a id="playBtn" href="../index.html" class="btn gold" style="display:none;margin-top:10px;text-align:center;text-decoration:none;">
        PLAY GAMES
      </a>

      <div id="statusBox">READY</div>
    </section>
  </main>

  <script src="../rewards/bankroll.js"></script>
  <script src="../rewards/member-system.js"></script>
  <script src="./claim.js"></script>
</body>
</html>
