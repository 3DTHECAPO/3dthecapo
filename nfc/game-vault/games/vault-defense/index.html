<!doctype html>
<html><head><meta charset="utf-8"><title>Vault Defense</title>
<style>
body{background:black;color:white;text-align:center;font-family:sans-serif}
canvas{background:#111;margin-top:20px}
</style></head>
<body>
<h1>Vault Defense</h1>
<canvas id="c" width="400" height="400"></canvas>
<script>
let c=document.getElementById('c'),ctx=c.getContext('2d');
let enemies=[],score=0;
function spawn(){enemies.push({x:Math.random()*380,y:0})}
setInterval(spawn,1000);
c.onclick=e=>{
let rect=c.getBoundingClientRect();
let x=e.clientX-rect.left,y=e.clientY-rect.top;
enemies=enemies.filter(t=>{
let hit=Math.hypot(t.x-x,t.y-y)<20;
if(hit) score++;
return !hit;
});
};
function draw(){
ctx.clearRect(0,0,400,400);
enemies.forEach(e=>{
e.y+=1.5;
ctx.beginPath();
ctx.arc(e.x,e.y,15,0,Math.PI*2);
ctx.fillStyle="red";
ctx.fill();
});
ctx.fillStyle="white";
ctx.fillText("Score: "+score,10,20);
requestAnimationFrame(draw);
}
draw();
</script>
</body></html>
