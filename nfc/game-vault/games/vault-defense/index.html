<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Vault Defense</title><link rel="stylesheet" href="../../shared.css"></head><body><main class="game-shell"><div class="game-header"><a class="back-link" href="../../index.html">← Back to Game Vault</a><h1 class="game-title">Vault Defense</h1></div><section class="hud"><div class="stat"><div class="stat-label">Integrity</div><div class="stat-value" id="integrity">100%</div></div><div class="stat"><div class="stat-label">Blocks</div><div class="stat-value" id="blocks">0</div></div><div class="stat"><div class="stat-label">Time</div><div class="stat-value" id="time">25</div></div></section><section class="stage center"><p class="small">Block breach attempts before they hit the vault core. Tap the flashing squares.</p><div class="message" id="msg">Press start to defend the core.</div><div class="bet-row"><button class="btn" id="startBtn">Start Defense</button><button class="btn secondary" id="resetBtn">Reset</button></div><div class="target-grid" id="grid"></div></section></main><script src="../../shared.js"></script><script>let integrity=100,blocks=0,time=25,active=false,tick,flash; const grid=document.getElementById('grid'); const msg=document.getElementById('msg'); const integrityEl=document.getElementById('integrity'), blocksEl=document.getElementById('blocks'), timeEl=document.getElementById('time'); for(let i=0;i<8;i++){ const b=document.createElement('button'); b.className='target'; b.textContent='■'; b.onclick=()=>{ if(b.classList.contains('active')){ blocks++; b.classList.remove('active'); paint(); } }; grid.appendChild(b); } function paint(){ integrityEl.textContent=integrity+'%'; blocksEl.textContent=blocks; timeEl.textContent=time; } function pulse(){ if(!active) return; const tiles=[...grid.children]; const t=GameVault.pick(tiles); t.classList.add('active'); setTimeout(()=>{ if(t.classList.contains('active')){ integrity=Math.max(0,integrity-8); t.classList.remove('active'); paint(); if(integrity===0){ end('Vault breached.'); } } },700); } function end(text){ clearInterval(tick); clearInterval(flash); active=false; msg.textContent=text; } function start(){ integrity=100; blocks=0; time=25; active=true; paint(); msg.textContent='Defense live.'; flash=setInterval(pulse,900); tick=setInterval(()=>{ time--; paint(); if(time<=0) end(integrity>0?'Core protected.':'Vault breached.'); },1000);} document.getElementById('startBtn').onclick=start; document.getElementById('resetBtn').onclick=()=>{ clearInterval(tick); clearInterval(flash); [...grid.children].forEach(t=>t.classList.remove('active')); integrity=100; blocks=0; time=25; active=false; msg.textContent='Press start to defend the core.'; paint(); }; paint();</script></body></html>
