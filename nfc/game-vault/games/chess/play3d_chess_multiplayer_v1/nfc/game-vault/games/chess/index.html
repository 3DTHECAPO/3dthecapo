<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PLAY 3D — Multiplayer Chess</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/nfc/shared/multiplayer/multiplayer.css">
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="bg"></div>
<main class="app">
<header class="top">
  <a class="brand" href="../../index.html"><span>3D</span><b>PLAY 3D</b></a>
  <nav><a href="../../index.html">Game Vault</a><a href="../../rewards/index.html">Rewards</a><a href="../../../index.html">Vault</a></nav>
</header>

<section class="hero">
  <div><div class="kicker">ONLINE ROOM CODES • LIVE MOVE SYNC</div><h1>Vault Chess</h1><p>Host plays White. Fan joins as Black. Local/CPU still work when no room is connected.</p></div>
  <div class="score"><span id="roomBadge">LOCAL</span><b id="turnText">WHITE</b><small id="stateText">READY</small></div>
</section>

<section class="layout">
  <aside class="panel">
    <h2>Mode</h2>
    <div class="modegrid">
      <button id="localBtn" class="active">Local</button>
      <button id="cpuBtn">Vs CPU</button>
      <button id="onlineBtn">Online</button>
    </div>
    <div id="mpMount"></div>
    <h2>Controls</h2>
    <button id="newBtn">New Game</button>
    <button id="flipBtn">Flip Board</button>
    <button id="undoBtn">Undo</button>
    <h2>Captured</h2>
    <div id="captured" class="captured"></div>
  </aside>

  <section class="board-shell">
    <div id="board" class="board"></div>
  </section>

  <aside class="panel">
    <h2>Move History</h2>
    <ol id="history"></ol>
  </aside>
</section>
</main>

<div id="modal" class="modal hidden"><div class="modal-card"><h2 id="modalTitle">Game Over</h2><p id="modalCopy"></p><button id="againBtn">Run It Back</button></div></div>

<script src="/nfc/shared/multiplayer/multiplayer-config.js"></script>
<script src="/nfc/shared/multiplayer/multiplayer-core.js"></script>
<script src="./script.js"></script>
</body>
</html>
