<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CAPO CHESS</title>
<style>
body{background:#000;color:#fff;text-align:center}
.grid{display:grid;grid-template-columns:repeat(8,40px);margin:auto}
.cell{width:40px;height:40px}
.black{background:#222}
.white{background:#eee}
</style>
</head>
<body>
<h1>CAPO CHESS</h1>
<div class="grid" id="board"></div>

<script>
const board=document.getElementById("board");
for(let i=0;i<64;i++){
  let c=document.createElement("div");
  c.className="cell "+((Math.floor(i/8)+i)%2?"black":"white");
  board.appendChild(c);
}
</script>
</body>
</html>
