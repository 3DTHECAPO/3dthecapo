<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>PLAY 3D CHESS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <a class="back" href="../../index.html" aria-label="Back">←</a>
      <div class="headcopy">
        <div class="kicker">3D THE CAPO</div>
        <div class="title">PLAY 3D CHESS</div>
      </div>
    </header>

    <section class="shell">
      <div class="status" id="status">WHITE TO MOVE</div>
      <div class="board-wrap">
        <div class="board" id="board" aria-label="Chess board"></div>
      </div>
      <div class="controls">
        <button class="btn" id="resetBtn" type="button">Reset</button>
      </div>
    </section>
  </main>
  <script src="./script.js"></script>
</body>
</html>
