<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#3a2a12"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity=".45"/>
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000" flood-opacity=".65"/>
    </filter>
  </defs>
  <circle cx="64" cy="64" r="58" fill="url(#bg)" stroke="#caa24a" stroke-width="4"/>
  <circle cx="64" cy="64" r="48" fill="rgba(0,0,0,.35)" stroke="rgba(242,210,123,.35)" stroke-width="2"/>
  <text x="64" y="86" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="76" font-weight="900"
        fill="#0a0a0a" stroke="#f2d27b" stroke-width="2.5"
        filter="url(#shadow)">♟</text>
</svg>