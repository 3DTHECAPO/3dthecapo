<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Hood Maze</title><link rel="stylesheet" href="../../shared.css"><link rel="stylesheet" href="./style.css"></head><body><div class="wrap"><div class="topbar"><a class="back-link" href="../../index.html">← Back to Vault</a><div class="title-block"><div class="kicker">Hood Maze</div><h1><span class="gold-text">Block</span> Run</h1><p>Pacman-style hood maze. Grab every money pickup. Dodge the heat. Clear the block to level up.</p></div><div class="hud"><div class="pill">Money Pickups</div><div class="pill">Heat Patrol</div><div class="pill">Swipe Buttons</div></div></div><section class="metal-panel game-shell"><div class="status-strip"><div class="stat-box"><span>Score</span><strong id="score">0</strong></div><div class="stat-box"><span>Lives</span><strong id="lives">3</strong></div><div class="stat-box"><span>Level</span><strong id="level">1</strong></div></div><div class="canvas-wrap" style="margin:16px 0"><canvas id="game" width="960" height="640"></canvas></div><div class="controls"><button class="play-btn" id="start">Start</button><button class="ghost-btn" id="reset">Reset</button></div><div class="maze-controls"><button class="dir" data-dir="up">↑</button></div><div class="maze-controls"><button class="dir" data-dir="left">←</button><button class="dir" data-dir="down">↓</button><button class="dir" data-dir="right">→</button></div><div class="message" id="msg">Use arrow keys, WASD, or the on-screen arrows.</div></section></div><script src="./script.js"></script></body></html>
