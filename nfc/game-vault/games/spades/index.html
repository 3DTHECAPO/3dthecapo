<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PLAY 3D SPADES</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
<link rel="stylesheet" href="../shared/superior/superior-events.css">
<link rel="stylesheet" href="../shared/mode-bar.css">
</head>
<body>
<div class="bg"></div>
<main class="app">
<header class="top">
  <a class="brand" href="../../index.html"><span>3D</span><b>PLAY 3D</b></a>
  <nav><a href="../../index.html">Game Vault</a><a href="../../../index.html">Vault</a></nav>
</header>

<section class="hero">
  <div>
    <div class="kicker">AAA SPADES TABLE</div>
    <h1>Spades</h1>
    <p>Team spades table with full felt layout, seating, trick play, bot turns, and score tracking.</p>
  </div>
  <div class="status">
    <span>SCORE</span>
    <b id="scoreText">0 - 0</b>
    <small id="turnText">READY</small>
  </div>
</section>

<section class="spades-layout" aria-label="Spades table layout">
  <aside class="spades-rail left-rail" aria-label="Spades game log">
    <section class="panel log-panel">
      <h2>Game Log</h2>
      <ol id="log"></ol>
    </section>
  </aside>

  <section class="casino-table" aria-label="Spades table">
    <div class="table-logo">SPADES</div>

    <div class="seat top-seat">NORTH<br><small>Partner</small></div>
    <div class="seat left-seat">WEST</div>
    <div class="seat right-seat">EAST</div>
    <div class="seat bottom-seat">YOU</div>

    <div class="table-center">
      <h2>Current Trick</h2>
      <div id="trickArea" class="trick-area"></div>
    </div>
  </section>

  <aside class="spades-rail right-rail" aria-label="Spades controls">
    <section class="controls panel">
      <button id="newBtn">Deal</button>
      <button class="bidBtn" data-bid="0">Bid Nil</button>
      <button class="bidBtn" data-bid="2">Bid 2</button>
      <button class="bidBtn" data-bid="3">Bid 3</button>
      <button class="bidBtn" data-bid="4">Bid 4</button>
      <button id="autoBtn">Auto Play</button>
    </section>
  </aside>
</section>

<section class="panel hand-dock">
  <h2>Your Hand</h2>
  <div id="hand" class="hand"></div>
</section>
</main>
<script src="../shared/superior/superior-lines.js"></script>
<script src="../shared/superior/superior-events.js"></script>
<script src="../shared/mode-bar.js"></script>
<script src="../shared/game-points.js"></script><script src="./script.js"></script><script>/* CPU SAFE FAN LOADER */
(function(){
  var p = new URLSearchParams(location.search);
  if(p.get('mode') !== 'fan' || !p.get('room')) return;

  function load(src){
    var s = document.createElement('script');
    s.src = src;
    document.body.appendChild(s);
  }

  load('../shared/supabase-game-bridge.js');
  load('../shared/multiplayer-room-ui.js');
})();
</script>
</body>
</html>
