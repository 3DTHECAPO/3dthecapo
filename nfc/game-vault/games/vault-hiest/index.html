<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vault Heist</title>
  <link rel="stylesheet" href="../../styles.css">
</head>
<body class="game-page">
  <div class="wrap">
    <div class="topbar">
      <a class="btn" href="../../index.html">Back To Game Vault</a>
      <a class="btn" href="../../../index.html?v=4">Back To Vault</a>
    </div>
    <section class="hero">
      <div class="eyebrow">Heist Route</div>
      <h1>Vault Heist</h1>
      <p>Pick the correct sequence to breach the inner layer. Bonus mode changes the reward if you win.</p>
    </section>
    <section class="game-shell">
      <div class="scorebar">
        <div class="pill">Stage: <span id="stage" style="margin-left:8px">1</span></div>
        <div class="pill">Bonus: <span id="bonus" style="margin-left:8px">Off</span></div>
      </div>
      <p class="status" id="status">Choose your first move.</p>
      <div class="choice-grid" id="choices">
        <button class="choice" data-pick="hack">Hack Panel</button>
        <button class="choice" data-pick="brute">Break Lock</button>
        <button class="choice" data-pick="code">Run Code</button>
      </div>
      <div class="actions" style="margin-top:18px">
        <a class="btn gold hidden" id="winBtn" href="../../../../index.html?v=4">Reward Ready</a>
        <button class="btn hidden" id="resetBtn" type="button">Run Again</button>
      </div>
    </section>
  </div>
  <script src="../../shared.js"></script>
  <script>
    const stages = ['hack','code','brute'];
    let step = 0;
    const bonus = GV.isBonus();
    document.getElementById('bonus').textContent = bonus ? 'On' : 'Off';
    const statusEl = document.getElementById('status');
    const stageEl = document.getElementById('stage');
    const resetBtn = document.getElementById('resetBtn');
    const winBtn = document.getElementById('winBtn');

    function resetGame(){
      step = 0;
      stageEl.textContent = '1';
      statusEl.textContent = 'Choose your first move.';
      document.querySelectorAll('.choice').forEach(b => b.disabled = false);
      resetBtn.classList.add('hidden');
      winBtn.classList.add('hidden');
    }

    function fail(){
      statusEl.textContent = 'Tripwire hit. The vault sealed. Run it back.';
      document.querySelectorAll('.choice').forEach(b => b.disabled = true);
      resetBtn.classList.remove('hidden');
    }

    function win(){
      const msg = bonus ? 'Heist complete. Bonus lane unlocked for NFC holder reward.' : 'Heist complete. Core vault reward unlocked.';
      statusEl.textContent = msg;
      document.querySelectorAll('.choice').forEach(b => b.disabled = true);
      GV.setReward('heist', bonus ? 'bonus' : 'core');
      winBtn.classList.remove('hidden');
      winBtn.textContent = bonus ? 'Bonus Reward Ready' : 'Reward Ready';
      resetBtn.classList.remove('hidden');
    }

    document.querySelectorAll('.choice').forEach(btn => {
      btn.addEventListener('click', () => {
        const pick = btn.dataset.pick;
        if (pick !== stages[step]) { fail(); return; }
        step++;
        if (step >= stages.length) { win(); return; }
        stageEl.textContent = String(step + 1);
        statusEl.textContent = 'Correct. Choose the next move.';
      });
    });

    resetBtn.addEventListener('click', resetGame);
  </script>
</body>
</html>
