<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Vault Heist</title><link rel="stylesheet" href="../../shared.css"></head><body><main class="game-shell"><div class="game-header"><a class="back-link" href="../../index.html">← Back to Game Vault</a><h1 class="game-title">Vault Heist</h1></div><section class="hud"><div class="stat"><div class="stat-label">Pairs Left</div><div class="stat-value" id="pairsLeft">6</div></div><div class="stat"><div class="stat-label">Moves</div><div class="stat-value" id="moves">0</div></div><div class="stat"><div class="stat-label">Status</div><div class="stat-value" id="status">Live</div></div></section><section class="stage"><p class="small center">Flip tiles and match the loot. Clear the vault in as few moves as possible.</p><div class="message center" id="msg">Find all matching pairs.</div><div class="heist-grid" id="grid"></div><div class="bet-row" style="margin-top:16px"><button class="btn secondary" id="resetBtn">New Round</button></div></section></main><script src="../../shared.js"></script><script>const icons=['💰','💎','👑','🔐','🪙','🧨']; let deck=[],first=null,lock=false,moves=0,pairs=6; const grid=document.getElementById('grid'); const pairsLeft=document.getElementById('pairsLeft'); const movesEl=document.getElementById('moves'); const msg=document.getElementById('msg'); function setup(){ deck=[...icons,...icons].sort(()=>Math.random()-.5); first=null; lock=false; moves=0; pairs=6; pairsLeft.textContent=pairs; movesEl.textContent=moves; grid.innerHTML=''; deck.forEach((icon,i)=>{ const b=document.createElement('button'); b.className='heist-tile'; b.dataset.icon=icon; b.dataset.index=i; b.textContent='?'; b.onclick=()=>flip(b); grid.appendChild(b); }); msg.textContent='Find all matching pairs.'; } function flip(btn){ if(lock || btn.classList.contains('matched') || btn===first) return; btn.textContent=btn.dataset.icon; btn.classList.add('revealed'); if(!first){ first=btn; return; } moves++; movesEl.textContent=moves; if(first.dataset.icon===btn.dataset.icon){ first.classList.add('matched'); btn.classList.add('matched'); first.classList.remove('revealed'); btn.classList.remove('revealed'); first=null; pairs--; pairsLeft.textContent=pairs; if(pairs===0) GameVault.confetti(msg,`Vault cleared in ${moves} moves`); } else { lock=true; const a=first; setTimeout(()=>{ a.textContent='?'; btn.textContent='?'; a.classList.remove('revealed'); btn.classList.remove('revealed'); first=null; lock=false; },650); } } document.getElementById('resetBtn').onclick=setup; setup();</script></body></html>
