<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PLAY 3D - Pinochle</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
<link rel="stylesheet" href="../shared/mode-bar.css">
</head>
<body>
<div class="bg"></div>
<main class="app">
  <header class="top">
    <a class="brand" href="../../index.html"><span>3D</span><b>PLAY 3D</b></a>
    <nav><a href="../../index.html">Game Vault</a><a href="../../rewards/index.html">Rewards</a><a href="../../../index.html">Vault</a></nav>
  </header>
  <section class="hero">
    <div><div class="kicker">CARD TABLE</div><h1>Pinochle</h1><p>Double-deck partnership Pinochle: bid, name trump, meld, then take tricks to 500.</p></div>
    <div class="score"><span>Score</span><b id="mainScore">0 - 0</b><small id="stateText">READY</small></div>
  </section>
  <section class="table">
    <div class="casino-table">
      <div class="table-logo">PINOCHLE</div>
      <div class="seat top-seat" id="seat1"></div>
      <div class="seat left-seat" id="seat2"></div>
      <div class="seat right-seat" id="seat3"></div>
      <div class="seat bottom-seat" id="seat0"></div>
      <div class="table-content pinochle-layout">
        <section class="control-panel" aria-label="Pinochle controls">
          <div class="row action-row">
            <button id="dealBtn">Deal</button>
            <label class="bid-field" for="bidInput"><span>Bid</span><input id="bidInput" type="number" min="50" step="10" value="50" aria-label="Bid amount"></label>
            <button id="teamBtn">Bid</button>
            <button id="passBidBtn">Pass</button>
            <button id="meldBtn">Meld</button>
          </div>
          <div class="row trump-row" aria-label="Choose trump suit">
            <button data-trump="S">Spades</button>
            <button data-trump="H">Hearts</button>
            <button data-trump="D">Diamonds</button>
            <button data-trump="C">Clubs</button>
          </div>
        </section>

        <section class="board-grid" aria-label="Pinochle table areas">
          <div class="game-zone opponent-zone">
            <h2>Opponents</h2>
            <div id="opponentHand" class="hand compact-hand"></div>
          </div>
          <div class="game-zone trick-zone">
            <h2>Trick Pile</h2>
            <div id="trickPile" class="hand trick-hand"></div>
          </div>
          <div class="game-zone meld-zone">
            <h2>Meld / Bid</h2>
            <div id="meldArea" class="hand meld-hand"></div>
          </div>
          <div class="game-zone stock-zone">
            <h2>Deck</h2>
            <div id="stockArea" class="hand compact-hand"></div>
          </div>
        </section>

        <section class="player-zone">
          <h2>Your Hand</h2>
          <div id="playerHand" class="hand player-hand"></div>
        </section>
      </div>
    </div>
  </section>
</main>
<script src="../shared/mode-bar.js"></script>
<script src="../shared/game-points.js"></script>
<script src="./script.js"></script>
<script>
(function(){
  var p = new URLSearchParams(location.search);
  if(p.get('mode') !== 'fan' || !p.get('room')) return;
  function load(src){ var s = document.createElement('script'); s.src = src; document.body.appendChild(s); }
  load('../shared/supabase-game-bridge.js');
  load('../shared/multiplayer-room-ui.js');
})();
</script>
</body>
</html>
