<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Reaction Lock</title><link rel="stylesheet" href="../../shared.css"></head><body><main class="game-shell"><div class="game-header"><a class="back-link" href="../../index.html">← Back to Game Vault</a><h1 class="game-title">Reaction Lock</h1></div><section class="hud"><div class="stat"><div class="stat-label">Best</div><div class="stat-value" id="bestMs">—</div></div><div class="stat"><div class="stat-label">Rounds</div><div class="stat-value" id="rounds">0</div></div><div class="stat"><div class="stat-label">Status</div><div class="stat-value" id="status">Ready</div></div></section><section class="stage center"><p class="small">Tap start, wait for green, then hit the trigger fast. Tap too early and the lock jams.</p><div id="light" style="width:140px;height:140px;border-radius:50%;margin:22px auto;background:#7a1f1f;box-shadow:0 0 30px rgba(255,80,80,.18), inset 0 0 30px rgba(0,0,0,.35);"></div><div class="message" id="msg">Press start to arm the lock.</div><div class="bet-row"><button class="btn" id="startBtn">Start</button><button class="btn secondary" id="triggerBtn">Trigger</button></div></section></main><script src="../../shared.js"></script><script>let armed=false, go=false, t0=0, timer=null, best=localStorage.getItem('reaction-lock-best'); const light=document.getElementById('light'); const msg=document.getElementById('msg'); const bestMs=document.getElementById('bestMs'); const roundsEl=document.getElementById('rounds'); const status=document.getElementById('status'); let rounds=0; bestMs.textContent=best?best+' ms':'—'; function resetLight(color,glow){light.style.background=color;light.style.boxShadow=glow;} document.getElementById('startBtn').onclick=()=>{ if(armed) return; armed=true; go=false; status.textContent='Armed'; msg.textContent='Wait for green…'; resetLight('#7a1f1f','0 0 30px rgba(255,80,80,.18), inset 0 0 30px rgba(0,0,0,.35)'); const delay=GameVault.rand(1200,3200); timer=setTimeout(()=>{go=true; t0=performance.now(); status.textContent='GO'; resetLight('#2d9d5b','0 0 35px rgba(87,210,140,.35), inset 0 0 30px rgba(0,0,0,.25)');},delay);}; document.getElementById('triggerBtn').onclick=()=>{ if(!armed){msg.textContent='Press start first.'; return;} if(!go){ clearTimeout(timer); armed=false; status.textContent='Jammed'; msg.textContent='Too early — lock jammed.'; resetLight('#9a5a00','0 0 35px rgba(255,165,0,.22), inset 0 0 30px rgba(0,0,0,.35)'); return;} const ms=Math.round(performance.now()-t0); rounds++; roundsEl.textContent=rounds; armed=false; go=false; status.textContent='Complete'; if(!best || ms < Number(best)){ best=ms; localStorage.setItem('reaction-lock-best',ms); bestMs.textContent=ms+' ms'; } GameVault.confetti(msg, `Unlocked in ${ms} ms`); resetLight('#d7ab4a','0 0 35px rgba(215,171,74,.28), inset 0 0 30px rgba(0,0,0,.25)');};</script></body></html>
