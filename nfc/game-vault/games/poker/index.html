<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>PLAY 3D POKER</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="./style.css"></head><body><main class="app"><header class="topbar"><a class="back" href="../../index.html" aria-label="Back">←</a><div class="headcopy"><div class="kicker">3D THE CAPO</div><div class="title">PLAY 3D POKER</div></div></header><section class="table-shell"><div class="marquee"><div class="stat-grid"><div class="stat"><span class="label">Bankroll</span><div class="value" id="bankrollValue">1000</div></div><div class="stat"><span class="label">Bet</span><div class="value" id="betValue">25</div></div><div class="stat"><span class="label">Phase</span><div class="value" id="phaseValue">Ready</div></div></div></div><div class="felt"><section class="seat"><div class="seat-header"><div class="seat-title">Dealer</div><div class="seat-note" id="dealerRankLabel">Hidden</div></div><div class="cards" id="dealerCards"></div></section><section class="seat"><div class="seat-header"><div class="seat-title">Player</div><div class="seat-note" id="playerRankLabel">Select cards to hold</div></div><div class="cards" id="playerCards"></div><div class="info-row"><span>Tap cards to hold</span><strong id="heldCount">0 Held</strong></div></section></div><div class="status" id="statusBar">Deal a hand, hold cards, then draw.</div><div class="controls"><button class="btn dark" id="betDownBtn" type="button">Bet -</button><button class="btn dark" id="betUpBtn" type="button">Bet +</button></div><div class="controls three"><button class="btn gold" id="dealBtn" type="button">Deal</button><button class="btn gold" id="drawBtn" type="button">Draw</button>
