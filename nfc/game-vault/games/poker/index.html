<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PLAY 3D - Poker</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
<link rel="stylesheet" href="../shared/superior/superior-events.css">
<link rel="stylesheet" href="../shared/mode-bar.css">
</head>
<body>
<div class="bg"></div>
<main class="app">
  <header class="top">
    <a class="brand" href="../../index.html"><span>3D</span><b>PLAY 3D</b></a>
    <nav><a href="../../index.html">Game Vault</a><a href="../../rewards/index.html">Rewards</a><a href="../../../index.html">Vault</a></nav>
  </header>
  <section class="hero">
    <div><div class="kicker">CARD TABLE</div><h1>Poker</h1><p>Playable video poker with hold, draw, shared credits, and responsive table layout.</p></div>
    <div class="score"><span>Status</span><b id="mainScore">0</b><small id="stateText">READY</small></div>
  </section>
  <section class="table poker-shell">
    <div class="poker-layout" aria-label="Poker table layout">
      <aside class="poker-rail" aria-label="Poker controls and status">
        <div class="row poker-controls">
          <button id="dealBtn">Deal</button>
          <button id="drawBtn">Draw</button>
          <button id="betDown">Bet -</button>
          <button id="betUp">Bet +</button>
          <button id="playAgainBtn">Play Again</button>
        </div>
        <section class="rail-zone poker-status">
          <h2>Status</h2>
          <p>Credits: <b id="credits">1000</b></p>
          <p>Bet: <b id="bet">25</b></p>
          <p>Hand: <b id="rankName">Ready</b></p>
          <p>Click cards to hold, then Draw.</p>
        </section>
      </aside>

      <div class="casino-table">
        <div class="table-logo">POKER</div>
        <div class="table-content poker-center">
          <div id="hand" class="hand"></div>
        </div>
      </div>
    </div>
  </section>
</main>
<script src="../shared/game-bank.js"></script>
<script src="../shared/game-points.js"></script>
<script src="../shared/superior/superior-lines.js"></script>
<script src="../shared/superior/superior-events.js"></script>
<script src="../shared/mode-bar.js"></script>
<script src="./script.js"></script>
<script>
(function(){
  var p = new URLSearchParams(location.search);
  if(p.get('mode') !== 'fan' || !p.get('room')) return;
  function load(src){ var s = document.createElement('script'); s.src = src; document.body.appendChild(s); }
  load('../shared/supabase-game-bridge.js');
  load('../shared/multiplayer-room-ui.js');
})();
</script>
</body>
</html>
