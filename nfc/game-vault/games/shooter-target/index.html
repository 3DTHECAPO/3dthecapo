<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Shooter Target</title><link rel="stylesheet" href="../../shared.css"></head><body><main class="game-shell"><div class="game-header"><a class="back-link" href="../../index.html">← Back to Game Vault</a><h1 class="game-title">Shooter Target</h1></div><section class="hud"><div class="stat"><div class="stat-label">Score</div><div class="stat-value" id="score">0</div></div><div class="stat"><div class="stat-label">Targets</div><div class="stat-value" id="hits">0</div></div><div class="stat"><div class="stat-label">Time</div><div class="stat-value" id="time">20</div></div></section><section class="stage"><p class="small center">Tap the moving targets before the timer ends.</p><div class="message center" id="msg">Press start to spawn targets.</div><div class="bet-row"><button class="btn" id="startBtn">Start Round</button></div><div class="arena" id="arena"><div class="crosshair"></div></div></section></main><script src="../../shared.js"></script><script>let score=0,hits=0,time=20,active=false,spawnTimer,tickTimer; const arena=document.getElementById('arena'); const scoreEl=document.getElementById('score'), hitsEl=document.getElementById('hits'), timeEl=document.getElementById('time'), msg=document.getElementById('msg'); function paint(){ scoreEl.textContent=score; hitsEl.textContent=hits; timeEl.textContent=time; } function spawn(){ if(!active) return; const e=document.createElement('button'); e.className='enemy'; e.textContent='✦'; e.style.left=Math.random()*(arena.clientWidth-52)+'px'; e.style.top=Math.random()*(arena.clientHeight-90)+'px'; e.onclick=()=>{ score+=10; hits++; paint(); e.remove(); }; arena.appendChild(e); setTimeout(()=>e.remove(),1200); } function reset(){ clearInterval(spawnTimer); clearInterval(tickTimer); [...arena.querySelectorAll('.enemy')].forEach(e=>e.remove()); score=0; hits=0; time=20; active=false; msg.textContent='Press start to spawn targets.'; paint(); } document.getElementById('startBtn').onclick=()=>{ reset(); active=true; msg.textContent='Round live.'; spawnTimer=setInterval(spawn,450); tickTimer=setInterval(()=>{ time--; paint(); if(time<=0){ clearInterval(spawnTimer); clearInterval(tickTimer); active=false; msg.textContent=`Round over — score ${score}`; } },1000); }; paint();</script></body></html>
