<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PLAY 3D - Rummy</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
<link rel="stylesheet" href="../shared/superior/superior-events.css">
<link rel="stylesheet" href="../shared/mode-bar.css">
</head>
<body>
<div class="bg"></div>
<main class="app">
  <header class="top">
    <a class="brand" href="../../index.html"><span>3D</span><b>PLAY 3D</b></a>
    <nav><a href="../../index.html">Game Vault</a><a href="../../rewards/index.html">Rewards</a><a href="../../../index.html">Vault</a></nav>
  </header>
  <section class="hero">
    <div><div class="kicker">CARD TABLE</div><h1>Rummy</h1><p>Draw, meld sets or runs, discard, and race the CPU opponent.</p></div>
    <div class="score"><span>Points</span><b id="mainScore">0</b><small id="stateText">READY</small></div>
  </section>
  <section class="table rummy-shell">
    <div class="rummy-layout" aria-label="Rummy table layout">
      <aside class="rummy-rail" aria-label="Rummy controls">
        <div class="row rummy-controls">
          <button id="dealBtn">Deal</button>
          <button id="drawStockBtn">Draw Stock</button>
          <button id="drawDiscardBtn">Draw Discard</button>
          <button id="meldBtn">Meld Selected</button>
          <button id="layoffBtn">Add Selected To Existing Meld</button>
          <button id="discardBtn">Discard Selected</button>
        </div>
        <section class="rail-zone rummy-status">
          <h2>Table</h2>
          <p>Draw, meld, discard. Keep the center table clear.</p>
        </section>
      </aside>

      <div class="casino-table">
        <div class="table-logo">RUMMY</div>
        <div class="table-content rummy-zones">
          <section class="rummy-zone opponent-zone"><h2>CPU Opponent</h2><div id="opponentHand" class="hand"></div></section>
          <section class="rummy-zone table-zone"><h2>Stock / Discard</h2><div id="tableCards" class="hand"></div></section>
          <section class="rummy-zone meld-zone"><h2>Melds</h2><div id="meldArea" class="hand"></div></section>
          <section class="rummy-zone player-zone"><h2>Your Hand</h2><div id="playerHand" class="hand"></div></section>
        </div>
      </div>
    </div>
  </section>
</main>
<script src="../shared/superior/superior-lines.js"></script>
<script src="../shared/superior/superior-events.js"></script>
<script src="../shared/mode-bar.js"></script>
<script src="../shared/game-points.js"></script>
<script src="./script.js"></script>
<script>
(function(){
  var p = new URLSearchParams(location.search);
  if(p.get('mode') !== 'fan' || !p.get('room')) return;
  function load(src){ var s = document.createElement('script'); s.src = src; document.body.appendChild(s); }
  load('../shared/supabase-game-bridge.js');
  load('../shared/multiplayer-room-ui.js');
})();
</script>
</body>
</html>
