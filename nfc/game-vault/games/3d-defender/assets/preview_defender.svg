    <text x="66" y="76" fill="#f2d27b" font-family="Arial Black, Arial, sans-serif" font-size="28" letter-spacing="3">3D DEFENDER</text>
    <text x="66" y="116" fill="#41f7ff" font-family="Arial, sans-serif" font-size="18" letter-spacing="5">NEON ARCADE SHOOTER</text>
