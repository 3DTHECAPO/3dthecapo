<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>3D Defender</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="ui" aria-live="polite">
    <div>SCORE: <span id="score">0</span></div>
    <div>WAVE: <span id="wave">1</span></div>
    <div>LIVES: <span id="lives">3</span></div>
  </div>

  <canvas id="game" width="800" height="600" aria-label="3D Defender arcade shooter"></canvas>

  <div id="mobileControls" aria-label="Mobile controls">
    <div id="movePad"><div id="moveStick"></div></div>
    <button id="fireBtn" type="button">FIRE</button>
  </div>

  <script src="./game.js"></script>
</body>
</html>
