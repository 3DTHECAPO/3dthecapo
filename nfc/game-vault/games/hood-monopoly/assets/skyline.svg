<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#08080F"/>
      <stop offset="40%" stop-color="#170B1F"/>
      <stop offset="70%" stop-color="#0A0C18"/>
      <stop offset="100%" stop-color="#040409"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e18"/>
      <stop offset="100%" stop-color="#02030a"/>
    </linearGradient>
    <linearGradient id="bridge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2218"/>
      <stop offset="100%" stop-color="#100c08"/>
    </linearGradient>
    <radialGradient id="moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F2D492" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#D4AF37" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="streetlight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD27A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFD27A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fog" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a14" stop-opacity="0"/>
      <stop offset="50%" stop-color="#1a1a24" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0a0a14" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- SKY -->
  <rect width="1600" height="900" fill="url(#sky)"/>
  <!-- Moon over the strait -->
  <circle cx="1180" cy="200" r="190" fill="url(#moon)"/>
  <circle cx="1180" cy="200" r="55" fill="#F2D492" opacity="0.78"/>

  <!-- Distant Mare Island silhouette / hills -->
  <g opacity="0.55">
    <path d="M0,560 L80,510 L180,540 L320,490 L450,520 L580,495 L730,535 L860,500 L1000,540 L1150,505 L1300,540 L1450,510 L1600,545 L1600,640 L0,640 Z" fill="#0d0d16"/>
    <path d="M0,610 L130,580 L280,605 L450,570 L640,605 L810,575 L980,605 L1170,575 L1370,610 L1600,580 L1600,640 L0,640 Z" fill="#0a0a12"/>
  </g>

  <!-- Mare Island shipyard cranes (left) -->
  <g opacity="0.85">
    <!-- Crane 1 -->
    <line x1="80" y1="640" x2="80" y2="430" stroke="#1b1b22" stroke-width="6"/>
    <line x1="80" y1="430" x2="170" y2="450" stroke="#1b1b22" stroke-width="4"/>
    <line x1="80" y1="430" x2="40" y2="455" stroke="#1b1b22" stroke-width="4"/>
    <line x1="150" y1="448" x2="150" y2="490" stroke="#1b1b22" stroke-width="2"/>
    <rect x="74" y="610" width="12" height="30" fill="#15151b"/>
    <!-- Crane 2 -->
    <line x1="240" y1="640" x2="240" y2="460" stroke="#1b1b22" stroke-width="6"/>
    <line x1="240" y1="460" x2="330" y2="478" stroke="#1b1b22" stroke-width="4"/>
    <line x1="240" y1="460" x2="200" y2="482" stroke="#1b1b22" stroke-width="4"/>
    <line x1="310" y1="476" x2="310" y2="515" stroke="#1b1b22" stroke-width="2"/>
    <!-- Cargo ship -->
    <rect x="350" y="610" width="220" height="20" fill="#0e0e14"/>
    <rect x="430" y="585" width="50" height="25" fill="#15151b"/>
    <line x1="455" y1="585" x2="455" y2="555" stroke="#1b1b22" stroke-width="2"/>
  </g>

  <!-- CARQUINEZ BRIDGE — across the middle horizon -->
  <g>
    <!-- Bridge deck -->
    <rect x="0" y="615" width="1600" height="8" fill="url(#bridge)"/>
    <!-- Deck supports -->
    <g fill="#1c1610">
      <rect x="60" y="623" width="3" height="40"/><rect x="160" y="623" width="3" height="50"/>
      <rect x="260" y="623" width="3" height="60"/><rect x="1400" y="623" width="3" height="48"/>
      <rect x="1500" y="623" width="3" height="58"/>
    </g>
    <!-- TOWERS (twin towers, Carquinez style) -->
    <g fill="url(#bridge)" stroke="#2a2218" stroke-width="1">
      <!-- Tower A -->
      <rect x="600" y="350" width="10" height="265"/>
      <rect x="640" y="350" width="10" height="265"/>
      <rect x="595" y="500" width="60" height="6"/>
      <rect x="595" y="430" width="60" height="6"/>
      <rect x="595" y="360" width="60" height="6"/>
      <!-- Tower B -->
      <rect x="950" y="370" width="10" height="245"/>
      <rect x="990" y="370" width="10" height="245"/>
      <rect x="945" y="510" width="60" height="6"/>
      <rect x="945" y="440" width="60" height="6"/>
      <rect x="945" y="380" width="60" height="6"/>
    </g>
    <!-- SUSPENSION CABLES (parabolas) -->
    <path d="M 0 615 Q 305 380 605 350 Q 780 320 955 370 Q 1280 470 1600 615"
          fill="none" stroke="#D4AF37" stroke-opacity="0.65" stroke-width="2"/>
    <path d="M 0 615 Q 305 410 605 380 Q 780 350 955 400 Q 1280 490 1600 615"
          fill="none" stroke="#D4AF37" stroke-opacity="0.35" stroke-width="1.5"/>
    <!-- vertical cable hangers -->
    <g stroke="#D4AF37" stroke-opacity="0.35" stroke-width="0.6">
      <line x1="100"  y1="615" x2="100"  y2="450"/>
      <line x1="200"  y1="615" x2="200"  y2="412"/>
      <line x1="300"  y1="615" x2="300"  y2="385"/>
      <line x1="400"  y1="615" x2="400"  y2="365"/>
      <line x1="500"  y1="615" x2="500"  y2="355"/>
      <line x1="700"  y1="615" x2="700"  y2="340"/>
      <line x1="800"  y1="615" x2="800"  y2="335"/>
      <line x1="900"  y1="615" x2="900"  y2="365"/>
      <line x1="1050" y1="615" x2="1050" y2="395"/>
      <line x1="1150" y1="615" x2="1150" y2="425"/>
      <line x1="1250" y1="615" x2="1250" y2="465"/>
      <line x1="1350" y1="615" x2="1350" y2="510"/>
      <line x1="1450" y1="615" x2="1450" y2="555"/>
    </g>
  </g>

  <!-- DOWNTOWN VALLEJO skyline (foreground, right side) -->
  <g>
    <rect x="1130" y="500" width="50"  height="120" fill="#0c0c12"/>
    <rect x="1190" y="450" width="70"  height="170" fill="#0d0d14"/>
    <rect x="1270" y="480" width="55"  height="140" fill="#0c0c12"/>
    <rect x="1335" y="420" width="80"  height="200" fill="#0e0e16"/>
    <rect x="1425" y="465" width="65"  height="155" fill="#0c0c12"/>
    <rect x="1500" y="440" width="90"  height="180" fill="#0d0d14"/>
  </g>

  <!-- Window lights (gold + cyan) -->
  <g fill="#D4AF37" opacity="0.85">
    <rect x="1140" y="540" width="5" height="8"/><rect x="1160" y="570" width="5" height="8"/>
    <rect x="1200" y="480" width="5" height="8"/><rect x="1230" y="510" width="5" height="8"/><rect x="1245" y="555" width="5" height="8"/>
    <rect x="1280" y="510" width="5" height="8"/><rect x="1300" y="560" width="5" height="8"/>
    <rect x="1345" y="450" width="5" height="8"/><rect x="1370" y="490" width="5" height="8"/><rect x="1400" y="540" width="5" height="8"/>
    <rect x="1435" y="495" width="5" height="8"/><rect x="1465" y="555" width="5" height="8"/>
    <rect x="1510" y="470" width="5" height="8"/><rect x="1540" y="520" width="5" height="8"/><rect x="1570" y="570" width="5" height="8"/>
  </g>
  <g fill="#7FFFD4" opacity="0.7">
    <rect x="1215" y="550" width="4" height="6"/><rect x="1360" y="520" width="4" height="6"/>
    <rect x="1490" y="525" width="4" height="6"/>
  </g>

  <!-- STREETLIGHTS along the waterfront / boardwalk -->
  <g>
    <g opacity="0.9">
      <line x1="200"  y1="760" x2="200"  y2="700" stroke="#2a2218" stroke-width="2"/>
      <circle cx="200" cy="700" r="4" fill="#FFD27A"/>
      <circle cx="200" cy="700" r="48" fill="url(#streetlight)"/>
    </g>
    <g opacity="0.9">
      <line x1="440"  y1="760" x2="440"  y2="700" stroke="#2a2218" stroke-width="2"/>
      <circle cx="440" cy="700" r="4" fill="#FFD27A"/>
      <circle cx="440" cy="700" r="48" fill="url(#streetlight)"/>
    </g>
    <g opacity="0.9">
      <line x1="700"  y1="760" x2="700"  y2="700" stroke="#2a2218" stroke-width="2"/>
      <circle cx="700" cy="700" r="4" fill="#FFD27A"/>
      <circle cx="700" cy="700" r="48" fill="url(#streetlight)"/>
    </g>
    <g opacity="0.9">
      <line x1="960"  y1="760" x2="960"  y2="700" stroke="#2a2218" stroke-width="2"/>
      <circle cx="960" cy="700" r="4" fill="#FFD27A"/>
      <circle cx="960" cy="700" r="48" fill="url(#streetlight)"/>
    </g>
    <g opacity="0.9">
      <line x1="1220" y1="760" x2="1220" y2="700" stroke="#2a2218" stroke-width="2"/>
      <circle cx="1220" cy="700" r="4" fill="#FFD27A"/>
      <circle cx="1220" cy="700" r="48" fill="url(#streetlight)"/>
    </g>
  </g>

  <!-- WATER -->
  <rect x="0" y="640" width="1600" height="260" fill="url(#water)"/>
  <!-- Water reflections (gold + cyan) -->
  <g opacity="0.35">
    <rect x="180" y="700" width="40" height="2" fill="#FFD27A"/>
    <rect x="190" y="720" width="22" height="1" fill="#FFD27A"/>
    <rect x="420" y="710" width="40" height="2" fill="#FFD27A"/>
    <rect x="680" y="715" width="40" height="2" fill="#FFD27A"/>
    <rect x="940" y="710" width="42" height="2" fill="#FFD27A"/>
    <rect x="1200" y="720" width="42" height="2" fill="#FFD27A"/>
    <rect x="600" y="630" width="6" height="40" fill="#D4AF37"/>
    <rect x="640" y="630" width="6" height="40" fill="#D4AF37"/>
    <rect x="950" y="630" width="6" height="40" fill="#D4AF37"/>
    <rect x="990" y="630" width="6" height="40" fill="#D4AF37"/>
  </g>

  <!-- Vallejo ferry (small boat with gold lights) -->
  <g>
    <rect x="350" y="700" width="120" height="14" fill="#0e0e14"/>
    <polygon points="350,700 330,714 350,714" fill="#0e0e14"/>
    <polygon points="470,700 490,714 470,714" fill="#0e0e14"/>
    <rect x="370" y="685" width="80" height="16" fill="#15151b"/>
    <rect x="380" y="688" width="6" height="6" fill="#FFD27A"/>
    <rect x="395" y="688" width="6" height="6" fill="#FFD27A"/>
    <rect x="410" y="688" width="6" height="6" fill="#FFD27A"/>
    <rect x="425" y="688" width="6" height="6" fill="#FFD27A"/>
    <rect x="440" y="688" width="6" height="6" fill="#FFD27A"/>
  </g>

  <!-- FOG layer over the water -->
  <rect x="0" y="600" width="1600" height="300" fill="url(#fog)"/>

  <!-- Bottom ground glow -->
  <rect x="0" y="860" width="1600" height="40" fill="url(#moon)" opacity="0.18"/>
</svg>
