<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PLAY 3D — Hood Monopoly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Oswald:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="hm-bg" aria-hidden="true"></div>
<main class="hm-app">
  <header class="hm-top">
    <a class="hm-brand" href="../../index.html"><span>3D</span><b>PLAY 3D</b><small>Hood Monopoly</small></a>
    <nav>
      <a href="../../index.html">Game Vault</a>
      <a href="../../../index.html">Vault</a>
      <a href="../../rewards/index.html">Rewards</a>
    </nav>
  </header>

  <section class="hm-hero">
    <div>
      <div class="kicker">HUSTLE • GRIND • DOMINATE</div>
      <h1>Hood Monopoly</h1>
      <p>Buy blocks, collect rent, dodge raids, and build the strongest PLAY 3D empire.</p>
    </div>
    <aside class="hm-turn-card">
      <span>Current Turn</span>
      <b id="turnName">Player 1</b>
      <small id="turnStatus">Roll to start.</small>
    </aside>
  </section>

  <section class="hm-layout">
    <section class="hm-board-wrap">
      <div id="board" class="hm-board" aria-label="Hood Monopoly board"></div>
    </section>

    <aside class="hm-panel">
      <div class="hm-dice-card">
        <div class="kicker">Dice</div>
        <div id="dice" class="hm-dice">--</div>
        <button id="rollBtn" class="gold-btn">Roll Dice</button>
        <button id="buyBtn">Buy Block</button>
        <button id="endBtn">End Turn</button>
        <button id="resetBtn" class="danger">Reset Game</button>
      </div>

      <div class="hm-log-card">
        <div class="kicker">Game Log</div>
        <div id="log" class="hm-log"></div>
      </div>
    </aside>
  </section>

  <section class="hm-players" id="players"></section>
</main>
<script src="./script.js"></script>
</body>
</html>
