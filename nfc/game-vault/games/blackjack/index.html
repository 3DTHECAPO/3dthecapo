<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PLAY 3D — Blackjack AAA</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css"><link rel="stylesheet" href="../shared/mode-bar.css">
</head>
<body>
<div class="bg"></div>

<main class="app">
<header class="top">
  <a class="brand" href="../../index.html">
    <span>3D</span>
    <b>PLAY 3D</b>
  </a>
  <nav>
    <a href="../../index.html">Game Vault</a>
    <a href="../../../index.html">Vault</a>
  </nav>
</header>

<section class="hero">
  <div>
    <div class="kicker">AAA BLACKJACK LOUNGE</div>
    <h1>Blackjack</h1>
    <p>Dark luxury casino table, clean card spacing, stable controls, and responsive mobile fit.</p>
  </div>

  <div class="status">
    <span>CREDITS</span>
    <b id="creditsText">1000</b>
    <small id="stateText">READY</small>
  </div>
</section>

<section class="blackjack-layout" aria-label="Blackjack table layout">
  <section class="casino-table" aria-label="Blackjack table">
    <div class="table-logo">21</div>

    <div class="dealer-seat">DEALER</div>
    <div class="player-seat">YOU</div>

    <div class="dealer-zone">
      <h2>Dealer</h2>
      <div id="dealerHand" class="hand"></div>
      <div id="dealerTotal" class="total">Total: ?</div>
    </div>

    <div class="player-zone">
      <h2>Your Hand</h2>
      <div id="playerHand" class="hand"></div>
      <div id="playerTotal" class="total">Total: 0</div>
    </div>
  </section>

  <aside class="blackjack-rail" aria-label="Blackjack controls and bank">
    <section class="controls panel">
      <button id="dealBtn">Deal</button>
      <button id="hitBtn">Hit</button>
      <button id="standBtn">Stand</button>
      <button id="doubleBtn">Double</button>
      <button id="playAgainBtn">Play Again</button>
    </section>

    <section class="panel bank">
      <h2>Bank</h2>
      <div class="bank-grid">
        <div><span>Credits</span><b id="credits">1000</b></div>
        <div><span>Bet</span><b id="bet">50</b></div>
        <div><span>Result</span><b id="result">Ready</b></div>
      </div>
    </section>
  </aside>
</section>
</main>

<script src="../shared/game-bank.js"></script>
<script src="../shared/game-points.js"></script><script src="../shared/mode-bar.js"></script><script src="./script.js"></script><script>/* CPU SAFE FAN LOADER */
(function(){
  var p = new URLSearchParams(location.search);
  if(p.get('mode') !== 'fan' || !p.get('room')) return;

  function load(src){
    var s = document.createElement('script');
    s.src = src;
    document.body.appendChild(s);
  }

  load('../shared/supabase-game-bridge.js');
  load('../shared/multiplayer-room-ui.js');
})();
</script>
</body>
</html>
