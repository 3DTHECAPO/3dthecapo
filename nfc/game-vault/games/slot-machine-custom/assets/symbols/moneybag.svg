  </filter>
</defs>
<rect x="8" y="8" width="144" height="144" rx="30" fill="url(#bg)" stroke="#caa24a" stroke-width="6"/>
<circle cx="80" cy="80" r="58" fill="rgba(0,0,0,.30)" stroke="rgba(242,210,123,.35)" stroke-width="3"/>
<text x="80" y="99" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="62" font-weight="900" fill="#65ff55" filter="url(#glow)">💰</text>
</svg>