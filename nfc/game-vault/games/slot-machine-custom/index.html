<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>PLAY 3D SLOTS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <a class="back" href="../../index.html" aria-label="Back">←</a>
      <div>
        <div class="kicker">3D THE CAPO</div>
        <div class="title">PLAY 3D SLOTS</div>
      </div>
    </header>

    <section class="machine">
      <div class="jackpot panel">
        <div class="label">Jackpot</div>
        <div class="jackpot-value" id="jackpotValue">125,000</div>
      </div>

      <div class="stats">
        <div class="panel stat"><div class="label">Credits</div><div class="value" id="creditsValue">1000</div></div>
        <div class="panel stat"><div class="label">Bet</div><div class="value" id="betValue">25</div></div>
        <div class="panel stat"><div class="label">Last Win</div><div class="value" id="lastWinValue">0</div></div>
        <div class="panel stat"><div class="label">Status</div><div class="value" id="statusValue">Ready</div></div>
      </div>

      <div class="machine-body">
        <div class="screen">
          <div class="reels" id="reels"></div>
        </div>

        <button class="lever" id="leverBtn" aria-label="Spin wheel">
          <span class="lever-track"></span>
          <span class="lever-stick"></span>
          <span class="lever-knob"></span>
        </button>
      </div>

      <div class="controls">
        <button class="btn secondary" id="downBetBtn">- Bet</button>
        <button class="btn primary" id="spinBtn">Spin</button>
      </div>
      <div class="controls">
        <button class="btn secondary" id="upBetBtn">+ Bet</button>
        <button class="btn secondary" id="autoBtn">Auto x10</button>
      </div>

      <div class="message" id="messageBar"></div>
    </section>
  </main>
  <script src="./script.js"></script>
</body>
</html>
