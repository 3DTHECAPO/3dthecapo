<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Capo Casino</title><link rel="stylesheet" href="../../shared.css"><link rel="stylesheet" href="style.css">
</head><body>
<div id="intro" class="intro"><div class="intro-panel panel"><div class="kicker">Capo Vault</div><h1 class="title"><span class="gold">Entering</span> Capo Casino</h1><p class="subtitle">Cinematic reward slot loading.</p><button id="enterBtn" class="btn">Enter</button></div></div>
<div class="slot-page wrap">
<a class="ghost-btn back" href="../../index.html">← Back to Vault</a>
<div class="machine panel">
<div class="machine-top"><div class="marquee">CAPO CASINO</div><div class="jackpot"><span>JACKPOT</span><strong id="jackpotValue">125000</strong></div><div class="creditbox"><span>Credits</span><strong id="creditsValue">1000</strong></div></div>

<div class="deck"><button id="betDownBtn" class="ghost-btn">Bet -</button><button id="spinBtn" class="btn spin">Spin</button><button id="betUpBtn" class="ghost-btn">Bet +</button></div>
<div class="mini-panels"><div class="mini panel"><span>Start Bank</span><strong>1000</strong></div><div class="mini panel"><span>Reset Credits</span><strong>Disabled</strong></div><div class="mini panel"><span>Mode</span><strong>Weighted Odds</strong></div></div>
</div>
</div>
<div id="winOverlay" class="win-overlay" aria-hidden="true"><div class="win-card panel"><div id="winTier" class="win-tier">WIN</div><div id="winText" class="win-text">CAPO REWARD</div><div id="winAmount" class="win-amount">+0</div><button id="closeWinBtn" class="btn">Continue</button></div></div>
