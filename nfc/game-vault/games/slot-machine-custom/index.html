<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>CAPO CASINO</title><link rel='stylesheet' href='style.css'></head><body>
<div class='app'>
  <header><a class='back' href='../../index.html'>← Back</a><div><div class='kicker'>3D THE CAPO</div><h1>CAPO CASINO</h1><p>Luxury vault slot machine.</p></div></header>
  <section class='machine'>
    <div class='topbar'><div><span>Credits</span><strong id='credits'>500</strong></div><div><span>Bet</span><strong id='bet'>25</strong></div><div><span>Jackpot</span><strong id='jackpot'>2500</strong></div></div>
    <div class='reels' id='reels'>
      <div class='reel'><div class='symbol' id='r0'>👑</div></div>

      <div class='reel'><div class='symbol' id='r2'>🔊</div></div>

    <div class='controls'>
      <button id='minus'>- Bet</button>
      <button id='spin' class='spin'>Spin</button>
      <button id='plus'>+ Bet</button>
    </div>
    <div class='message' id='msg'>Hit spin to run the vault.</div>

  </section>
</div>
<script src='script.js'></script></body></html>
