<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>CAPO CASINO</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="page-bg"></div>
  <main class="slot-app">
    <a class="back-link" href="../../index.html">← Vault</a>

    <section class="machine-shell" aria-label="Capo Casino slot machine">
      <header class="machine-top">
        <div class="brand-wrap">
          <img class="brand-logo" src="./assets/logo.jpg" alt="3D THE CAPO logo">
          <div class="brand-text">
            <div class="eyebrow">CAPO CASINO</div>
            <h1>Reward Slot</h1>
          </div>
        </div>
        <div class="jackpot-panel">
          <div class="jackpot-kicker">Progressive Jackpot</div>
          <div class="jackpot-value" id="jackpot">25,000</div>
        </div>
      </header>

      <section class="stats-grid" aria-label="Machine stats">
        <div class="stat-card"><span>Credits</span><strong id="credits">1000</strong></div>
        <div class="stat-card"><span>Bet</span><strong id="bet">25</strong></div>
        <div class="stat-card"><span>Last Win</span><strong id="lastWin">0</strong></div>
        <div class="stat-card"><span>Status</span><strong id="status">Ready</strong></div>
      </section>

      <section class="reel-stage" aria-label="Slot reels">
        <div class="reel-frame-glow"></div>
        <div class="payline payline-top"></div>
        <div class="payline payline-mid"></div>
        <div class="payline payline-bot"></div>
        <div class="reels" id="reels"></div>
      </section>

      <section class="controls" aria-label="Machine controls">
        <button class="control ghost" id="betDown" type="button">− Bet</button>
        <button class="control spin" id="spinBtn" type="button">Spin</button>
        <button class="control ghost" id="betUp" type="button">＋ Bet</button>
      </section>

      <section class="controls secondary-controls" aria-label="Extra controls">
        <button class="control slim" id="autoBtn" type="button">Auto x10</button>
        <button class="control slim" id="resetBtn" type="button">Reset Credits</button>
      </section>

      <div class="message-bar" id="message">Ready to spin.</div>
    </section>
  </main>
  <script src="./script.js"></script>
</body>
</html>
