<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Capo Casino</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app">
    <div class="topbar">
      <a class="back" href="../../index.html" aria-label="Back">←</a>
      <div class="brand">
        <div class="brandline">3D THE CAPO</div>
        <div class="subbrand">Capo Casino</div>
      </div>
    </div>

    <section class="machine" id="machine">
      <div class="overlay" id="overlay">
        <div class="modal">
          <div class="modal-logo"><img src="./assets/logo.png" alt=""></div>
          <h1>Capo Casino</h1>
          <button class="btn primary" id="enterBtn">Enter</button>
        </div>
      </div>

      <div class="jackpot">
        <div class="label">Jackpot</div>
        <div class="jackpot-value" id="jackpotValue">125,000</div>
      </div>

      <div class="brand-panel">
        <div class="brand-mark"><img src="./assets/logo.png" alt=""></div>
        <div>
          <div class="brand-big">3D THE CAPO</div>
          <div class="brand-small">Capo Casino</div>
        </div>
      </div>

      <div class="stats">
        <div class="stat"><div class="label">Credits</div><div class="stat-value" id="creditsValue">1000</div></div>
        <div class="stat"><div class="label">Bet</div><div class="stat-value" id="betValue">25</div></div>
        <div class="stat"><div class="label">Last Win</div><div class="stat-value" id="lastWinValue">0</div></div>
        <div class="stat"><div class="label">Status</div><div class="stat-value" id="statusValue">Ready</div></div>
      </div>

      <div class="reel-frame" id="reelFrame">
        <div class="reels" id="reels"></div>
      </div>

      <div class="controls">
        <button class="btn secondary" id="downBetBtn">- Bet</button>
        <button class="btn primary" id="spinBtn">Spin</button>
      </div>
      <div class="actions">
        <button class="btn secondary" id="upBetBtn">+ Bet</button>
        <button class="btn secondary" id="autoBtn">Auto x10</button>
      </div>

      <div class="messagebar" id="messageBar"></div>
    </section>
  </main>
  <script src="./script.js"></script>
</body>
</html>
