<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Capo Casino</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app">
    <div class="topbar">
      <a class="back" href="../../index.html" aria-label="Back">←</a>
      <div class="topcopy">
        <div class="eyebrow">3D THE CAPO</div>
        <div class="brand">Capo Casino</div>
      </div>
    </div>

    <section class="machine">
      <div class="overlay" id="overlay">
        <div class="overlay-card">
          <div class="overlay-title">Capo Casino</div>
          <button class="btn primary" id="enterBtn">Enter</button>
        </div>
      </div>

      <div class="jackpot">
        <div class="label">Jackpot</div>
        <div class="jackpot-value" id="jackpotValue">125,000</div>
      </div>

      <div class="stats">
        <div class="stat"><span class="label">Credits</span><strong id="creditsValue">1000</strong></div>
        <div class="stat"><span class="label">Bet</span><strong id="betValue">25</strong></div>
        <div class="stat"><span class="label">Last Win</span><strong id="lastWinValue">0</strong></div>
        <div class="stat"><span class="label">Status</span><strong id="statusValue">Ready</strong></div>
      </div>

      <div class="reel-shell" id="reelFrame">
        <div class="reels" id="reels"></div>
      </div>

      <div class="control-row">
        <button class="btn secondary" id="downBetBtn">- Bet</button>
        <button class="btn primary spin" id="spinBtn">Spin</button>
      </div>
      <div class="control-row">
        <button class="btn secondary" id="upBetBtn">+ Bet</button>
        <button class="btn secondary" id="autoBtn">Auto x10</button>
      </div>

      <div class="messagebar" id="messageBar"></div>
    </section>
  </main>
  <script src="./script.js"></script>
</body>
</html>
