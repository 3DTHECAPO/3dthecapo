<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Capo Casino</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <a class="back" href="../../index.html" aria-label="Back">←</a>
      <div>
        <div class="kicker">3D THE CAPO</div>
        <div class="title">Capo Casino</div>
      </div>
    </header>

    <section class="machine">
      <div class="toprow">
        <div class="jackpot panel">
          <div class="label">Jackpot</div>
          <div class="jackpot-value" id="jackpot">125,000</div>
        </div>
      </div>

      <div class="stats">
        <div class="panel stat"><div class="label">Credits</div><div class="value" id="credits">1000</div></div>
        <div class="panel stat"><div class="label">Bet</div><div class="value" id="bet">25</div></div>
        <div class="panel stat"><div class="label">Last Win</div><div class="value" id="lastWin">0</div></div>
        <div class="panel stat"><div class="label">Status</div><div class="value" id="status">Ready</div></div>
      </div>

      <div class="screen">
        <div class="reels" id="reels"></div>
      </div>

      <div class="controls">
        <button class="btn secondary" id="minusBet">- Bet</button>
        <button class="btn primary" id="spin">Spin</button>
      </div>
      <div class="controls">
        <button class="btn secondary" id="plusBet">+ Bet</button>
        <button class="btn secondary" id="auto">Auto x10</button>
      </div>

      <div class="message" id="message"></div>
    </section>
  </main>
  <script src="./script.js"></script>
</body>
</html>
