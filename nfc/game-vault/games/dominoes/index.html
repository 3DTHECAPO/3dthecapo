<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PLAY 3D — Chess Fixed Board</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css"><link rel="stylesheet" href="../shared/mode-bar.css">
</head>
<body>
<div class="bg"></div>

<main class="app">
  <header class="top">
    <a class="brand" href="../../index.html"><span>3D</span><b>PLAY 3D</b></a>
    <nav>
      <a href="../../index.html">Game Vault</a>
      <a href="../../../index.html">Vault</a>
    </nav>
  </header>

  <section class="hero">
    <div>
      <div class="kicker">FIXED FULL-SQUARE BOARD</div>
      <h1>Vault Chess</h1>
      <p>All 64 squares stay full size before and after every move.</p>
    </div>
    <div class="score">
      <span>Turn</span>
      <b id="turnText">WHITE</b>
      <small id="stateText">READY</small>
    </div>
  </section>

  <section class="chess-layout" aria-label="Chess table layout">
    <section class="casino-table chess-table" aria-label="Chess board table">
      <div class="table-logo">CHESS</div>
      <div class="chess-stage">
        <div class="board-wrap">
          <div id="board" class="chessboard"></div>
        </div>
      </div>
    </section>

    <aside class="chess-rail" aria-label="Chess controls and status">
      <section class="controls panel">
        <button id="resetBtn">Reset</button>
        <button id="flipBtn">Flip Board</button>
      </section>
      <section class="panel chess-status-card">
        <h2>Board</h2>
        <p>Full-square board with controls kept off the playfield.</p>
      </section>
    </aside>
  </section>
</main>

<script src="../shared/mode-bar.js"></script>
<script src="../shared/game-points.js"></script><script src="../shared/chess-engine.js"></script><script src="./script.js"></script><script>/* CPU SAFE FAN LOADER */
(function(){
  var p = new URLSearchParams(location.search);
  if(p.get('mode') !== 'fan' || !p.get('room')) return;

  function load(src){
    var s = document.createElement('script');
    s.src = src;
    document.body.appendChild(s);
  }

  load('../shared/supabase-game-bridge.js');
  load('../shared/multiplayer-room-ui.js');
})();
</script>
</body>
</html>
