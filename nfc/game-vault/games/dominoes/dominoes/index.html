<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PLAY 3D — Multiplayer Dominoes</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/nfc/shared/multiplayer/multiplayer.css">
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="bg"></div>
<main class="app">
<header class="top">
  <a class="brand" href="../../index.html"><span>3D</span><b>PLAY 3D</b></a>
  <nav><a href="../../index.html">Game Vault</a><a href="../../rewards/index.html">Rewards</a><a href="../../../index.html">Vault</a></nav>
</header>

<section class="hero">
  <div><div class="kicker">ONLINE ROOM CODES • LIVE TILE SYNC</div><h1>Dominoes</h1><p>Host vs Fan domino table. Local CPU still works when no room is connected.</p></div>
  <div class="score"><span id="roomBadge">LOCAL</span><b id="mainScore">0-0</b><small id="stateText">READY</small></div>
</section>

<section class="layout">
  <aside class="panel">
    <h2>Mode</h2>
    <div class="modegrid">
      <button id="localBtn" class="active">Local CPU</button>
      <button id="onlineBtn">Online</button>
    </div>
    <div id="mpMount"></div>
    <h2>Controls</h2>
    <button id="newGame">New Game</button>
    <button id="drawBtn">Draw</button>
    <button id="passBtn">Pass</button>
  </aside>

  <section class="table">
    <h2>Table Chain</h2>
    <div class="board" id="board"></div>
    <h2>Your Hand</h2>
    <div class="domino-hand" id="hand"></div>
  </section>

  <aside class="panel">
    <h2>Log</h2>
    <ol id="log"></ol>
  </aside>
</section>
</main>

<script src="/nfc/shared/multiplayer/multiplayer-config.js"></script>
<script src="/nfc/shared/multiplayer/multiplayer-core.js"></script>
<script src="./script.js"></script>
</body>
</html>
