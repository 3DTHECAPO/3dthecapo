<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Capo Night Run</title><link rel="stylesheet" href="../../shared.css"><link rel="stylesheet" href="./style.css"></head><body><div class="wrap"><div class="topbar"><a class="back-link" href="../../index.html">← Back to Vault</a><div class="title-block"><div class="kicker">Bay Run</div><h1><span class="gold-text">Night</span> Run</h1><p>Dodge traffic, build speed, and survive the bridge run. Arrows steer. Space or BOOST uses nitro.</p></div><div class="hud"><div class="pill">Bridge Skyline</div><div class="pill">Touch Steer</div><div class="pill">Boost</div></div></div><section class="metal-panel game-shell"><div class="status-strip"><div class="stat-box"><span>Rep</span><strong id="score">0</strong></div><div class="stat-box"><span>Speed</span><strong id="speed">1.0</strong></div><div class="stat-box"><span>Boost</span><strong id="boost">100</strong></div></div><div class="canvas-wrap" style="margin:16px 0"><canvas id="game" width="980" height="640"></canvas></div><div class="controls"><button class="play-btn" id="start">Start Run</button><button class="ghost-btn" id="reset">Reset</button></div><div class="tiny-controls mobile-pad"><button class="ghost-btn" id="leftBtn">Left</button><button class="ghost-btn" id="boostBtn">Boost</button><button class="ghost-btn" id="rightBtn">Right</button></div><div class="message" id="msg">Stay alive and stack rep.</div></section></div><script src="./script.js"></script></body></html>
