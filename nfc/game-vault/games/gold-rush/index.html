<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Gold Rush</title><link rel="stylesheet" href="../../shared.css"></head><body><main class="game-shell"><div class="game-header"><a class="back-link" href="../../index.html">← Back to Game Vault</a><h1 class="game-title">Gold Rush</h1></div><section class="hud"><div class="stat"><div class="stat-label">Gold</div><div class="stat-value" id="gold">0</div></div><div class="stat"><div class="stat-label">Target</div><div class="stat-value">120</div></div><div class="stat"><div class="stat-label">Time</div><div class="stat-value" id="time">20</div></div></section><section class="stage center"><div class="gold-stack">💰</div><p class="small">Tap collect before the timer ends. Random bonus drops can spike your total.</p><div class="message" id="msg">Hit 120 to win the round.</div><div class="bet-row"><button class="btn collect-btn" id="collectBtn">Collect Gold</button><button class="btn secondary" id="resetBtn">Reset</button></div><div style="max-width:520px;margin:18px auto 0"><div class="progress"><span id="bar"></span></div></div></section></main><script src="../../shared.js"></script><script>let gold=0,time=20,timer,active=false; const goldEl=document.getElementById('gold'), timeEl=document.getElementById('time'), msg=document.getElementById('msg'), bar=document.getElementById('bar'); function paint(){ goldEl.textContent=gold; timeEl.textContent=time; bar.style.width=Math.min(100,(gold/120)*100)+'%'; } function start(){ if(active) return; active=true; timer=setInterval(()=>{ time--; paint(); if(time<=0){ clearInterval(timer); active=false; msg.textContent = gold>=120 ? 'Vault filled — you win.' : 'Time up — run it back.'; } },1000);} document.getElementById('collectBtn').onclick=()=>{ start(); if(!active && time<=0) return; gold += GameVault.rand(6,14); if(Math.random()>.78) gold += GameVault.rand(10,28); paint(); if(gold>=120) msg.textContent='Bonus threshold hit — keep stacking.'; }; document.getElementById('resetBtn').onclick=()=>{ clearInterval(timer); gold=0; time=20; active=false; msg.textContent='Hit 120 to win the round.'; paint(); }; paint();</script></body></html>
