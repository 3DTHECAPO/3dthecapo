<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PLAY 3D — 3D Casino Empire</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>
<body data-game="3d-casino-empire">
<div class="bg"></div>
<main class="app">
<header class="top">
  <a class="brand" href="../../index.html"><span>3D</span><b>PLAY 3D</b></a>
  <nav><a href="../../index.html">Game Vault</a><a href="../../rewards/index.html">Rewards</a><a href="../../../index.html">Vault</a></nav>
</header>
<section class="hero">
  <div><div class="kicker">CASINO MANAGEMENT</div><h1>3D Casino Empire</h1><p>Build your underground casino empire with tables, chips, upgrades, and vault profit.</p></div>
  <div class="score"><span>Status</span><b id="mainScore">0</b><small id="stateText">READY</small></div>
</section>
<section class="stage">
  <div class="game-screen" id="screen"><div class="player" id="player"></div></div>
  <aside class="panel">
    <h2>EMPIRE</h2>
    <div class="stat"><span>Health</span><b id="health">100</b></div>
    <div class="stat"><span>Timer</span><b id="timer">60</b></div>
    <div class="controls">
      <button id="startBtn">Open Casino</button>
      <button id="resetBtn">Reset</button>
      <button id="upBtn">Up</button>
      <button id="downBtn">Down</button>
      <button id="leftBtn">Left</button>
      <button id="rightBtn">Right</button>
    </div>
    <h2 style="margin-top:16px">Mission Log</h2>
    <div class="log" id="log"></div>
  </aside>
</section>
</main>
<script src="./script.js"></script>
</body>
</html>
