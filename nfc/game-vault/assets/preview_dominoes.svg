    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0v56" fill="none" stroke="#ffffff" stroke-opacity=".035" stroke-width="2"/>
    </pattern>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
