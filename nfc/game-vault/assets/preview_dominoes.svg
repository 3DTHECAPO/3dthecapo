      <circle cx="576" cy="292" r="7" fill="#090806"/><circle cx="604" cy="320" r="7" fill="#090806"/>
      <circle cx="662" cy="292" r="7" fill="#090806"/><circle cx="682" cy="322" r="7" fill="#090806"/>
    </g>
