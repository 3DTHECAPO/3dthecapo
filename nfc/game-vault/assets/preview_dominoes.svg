<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="DOMINOES preview card">
  <defs>
    <radialGradient id="goldGlow" cx="28%" cy="15%" r="70%">
      <stop offset="0%" stop-color="#f2d27b" stop-opacity=".55"/>
      <stop offset="42%" stop-color="#caa24a" stop-opacity=".16"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="redGlow" cx="82%" cy="18%" r="58%">
      <stop offset="0%" stop-color="#8d0d0d" stop-opacity=".38"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#211a0d"/>
      <stop offset="45%" stop-color="#080806"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff4ad"/>
      <stop offset="48%" stop-color="#f2d27b"/>
