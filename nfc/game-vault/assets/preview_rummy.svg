      <text x="429" y="348" text-anchor="middle" font-family="Georgia" font-size="68" fill="#8d0d0d">♥</text>
    </g>
    <g>
      <rect x="505" y="220" width="118" height="172" rx="14" fill="#f5efe3" stroke="#caa24a" stroke-width="5"/>
      <text x="564" y="278" text-anchor="middle" font-family="Impact" font-size="42" fill="#8d0d0d">8</text>
      <text x="564" y="348" text-anchor="middle" font-family="Georgia" font-size="68" fill="#8d0d0d">♥</text>
    </g>
    <g>
      <rect x="640" y="220" width="118" height="172" rx="14" fill="#f5efe3" stroke="#caa24a" stroke-width="5"/>
      <text x="699" y="278" text-anchor="middle" font-family="Impact" font-size="42" fill="#8d0d0d">9</text>
      <text x="699" y="348" text-anchor="middle" font-family="Georgia" font-size="68" fill="#8d0d0d">♥</text>
    </g>
    <text x="600" y="472" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="42" fill="url(#gold)" letter-spacing="6">RUN BUILDER</text>
  </g>

  <text x="600" y="552" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="66" fill="#f5efe3" letter-spacing="5" filter="url(#soft)">RUMMY</text>
