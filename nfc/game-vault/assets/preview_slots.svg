<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="3D SLOTS preview card">
  <defs>
    <radialGradient id="goldGlow" cx="28%" cy="15%" r="70%">
      <stop offset="0%" stop-color="#f2d27b" stop-opacity=".55"/>
      <stop offset="42%" stop-color="#caa24a" stop-opacity=".16"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="redGlow" cx="82%" cy="18%" r="58%">
      <stop offset="0%" stop-color="#8d0d0d" stop-opacity=".38"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#211a0d"/>
      <stop offset="45%" stop-color="#080806"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff4ad"/>
      <stop offset="48%" stop-color="#f2d27b"/>
      <stop offset="100%" stop-color="#8b641f"/>
    </linearGradient>
    <linearGradient id="darkGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f2d27b"/>
      <stop offset="100%" stop-color="#6b4712"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="13" flood-color="#000000" flood-opacity=".82"/>
      <feDropShadow dx="0" dy="0" stdDeviation="13" flood-color="#f2d27b" flood-opacity=".28"/>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#000000" flood-opacity=".7"/>
    </filter>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0v56" fill="none" stroke="#ffffff" stroke-opacity=".035" stroke-width="2"/>
    </pattern>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect width="1200" height="720" fill="url(#grid)"/>
  <rect width="1200" height="720" fill="url(#goldGlow)"/>
  <rect width="1200" height="720" fill="url(#redGlow)"/>
  <rect x="62" y="62" width="1076" height="596" rx="34" fill="none" stroke="#f2d27b" stroke-opacity=".22" stroke-width="3"/>
  <rect x="92" y="92" width="1016" height="536" rx="26" fill="none" stroke="#ffffff" stroke-opacity=".07" stroke-width="2"/>
  <path d="M0 530 C240 438 394 465 600 536 C804 608 990 590 1200 504 L1200 720 L0 720 Z" fill="#000" opacity=".52"/>

  
  <g filter="url(#soft)">
    <rect x="310" y="150" width="460" height="255" rx="42" fill="#070604" stroke="#f2d27b" stroke-opacity=".45" stroke-width="5"/>
    <rect x="338" y="178" width="404" height="195" rx="26" fill="#150f08" stroke="#ffffff" stroke-opacity=".08"/>
    
    <rect x="360" y="190" width="120" height="160" rx="22" fill="#090806" stroke="#f2d27b" stroke-opacity=".5" stroke-width="4"/>
    <text x="420" y="292" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="70" fill="url(#gold)" filter="url(#glow)">7</text>
    <rect x="500" y="190" width="120" height="160" rx="22" fill="#090806" stroke="#f2d27b" stroke-opacity=".5" stroke-width="4"/>
    <text x="560" y="292" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="70" fill="url(#gold)" filter="url(#glow)">3D</text>
    <rect x="640" y="190" width="120" height="160" rx="22" fill="#090806" stroke="#f2d27b" stroke-opacity=".5" stroke-width="4"/>
    <text x="700" y="292" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="70" fill="url(#gold)" filter="url(#glow)">$</text>
    <circle cx="805" cy="215" r="18" fill="#8d0d0d" stroke="#f2d27b" stroke-width="3"/>
    <path d="M805 235 C852 277 852 340 804 382" fill="none" stroke="url(#darkGold)" stroke-width="14" stroke-linecap="round"/>
    <circle cx="804" cy="390" r="24" fill="url(#gold)" stroke="#3a2509" stroke-width="4"/>
    <text x="540" y="132" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="42" fill="url(#gold)" letter-spacing="6">JACKPOT</text>
  </g>

  <text x="600" y="552" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="66" fill="#f5efe3" letter-spacing="5" filter="url(#soft)">3D SLOTS</text>
  <text x="600" y="604" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#f2d27b" letter-spacing="9" font-weight="800">CASINO ROOM</text>
  <text x="86" y="670" font-family="Arial, sans-serif" font-size="18" fill="#f2d27b" opacity=".78" letter-spacing="5">PLAY 3D</text>
  <text x="1000" y="670" font-family="Arial, sans-serif" font-size="18" fill="#f2d27b" opacity=".78" letter-spacing="5">FAN MODE</text>
</svg>