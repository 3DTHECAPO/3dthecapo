<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 620" role="img" aria-labelledby="title desc">
<title id="title">PLAY 3D Robot Butler Replaceable Asset</title>
<desc id="desc">Original compact luxury robot butler in black and gold PLAY 3D vault style.</desc>
<defs>
  <linearGradient id="gold" x1="0" x2="1">
    <stop offset="0" stop-color="#fff0a8"/>
    <stop offset=".52" stop-color="#caa24a"/>
    <stop offset="1" stop-color="#745215"/>
  </linearGradient>
  <linearGradient id="metal" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#2a2a2a"/>
    <stop offset=".45" stop-color="#050505"/>
    <stop offset="1" stop-color="#171717"/>
  </linearGradient>
  <radialGradient id="glow" cx="50%" cy="38%" r="55%">
    <stop offset="0" stop-color="#f2d27b" stop-opacity=".35"/>
    <stop offset=".65" stop-color="#000" stop-opacity="0"/>
  </radialGradient>
  <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="18" stdDeviation="12" flood-color="#000" flood-opacity=".75"/>
  </filter>
</defs>
<ellipse cx="170" cy="592" rx="112" ry="22" fill="#000" opacity=".62"/>
<circle cx="170" cy="210" r="128" fill="url(#glow)"/>
<g filter="url(#shadow)">
  <!-- dome head -->
  <path d="M86 142c0-58 38-98 84-98s84 40 84 98v38H86Z" fill="url(#metal)" stroke="url(#gold)" stroke-width="4"/>
  <path d="M104 136c8-38 36-63 66-63s58 25 66 63" fill="none" stroke="#fff" stroke-opacity=".08" stroke-width="10"/>
  <rect x="98" y="134" width="144" height="44" rx="22" fill="#020202" stroke="#1d1d1d" stroke-width="3"/>
  <circle cx="138" cy="156" r="10" fill="#f2d27b"/>
  <circle cx="202" cy="156" r="10" fill="#f2d27b"/>
  <path d="M150 175c12 8 28 8 40 0" stroke="url(#gold)" stroke-width="4" stroke-linecap="round" opacity=".75"/>
  <path d="M154 46h32l10 24h-52Z" fill="url(#gold)"/>
  <circle cx="170" cy="39" r="13" fill="url(#gold)"/>
  <!-- neck -->
  <rect x="145" y="180" width="50" height="32" rx="12" fill="#0b0b0b" stroke="url(#gold)" stroke-width="3"/>
  <!-- body shell -->
  <path d="M78 242c16-32 48-49 92-49s76 17 92 49l28 224c-32 44-72 66-120 66s-88-22-120-66Z" fill="url(#metal)" stroke="url(#gold)" stroke-width="4"/>
  <path d="M107 250c24-24 102-24 126 0l18 188c-22 26-49 39-81 39s-59-13-81-39Z" fill="#050505" stroke="#242424" stroke-width="3"/>
  <path d="M121 280h98v80h-98Z" fill="#0d0d0d" stroke="url(#gold)" stroke-width="3" rx="10"/>
  <path d="M137 298h66" stroke="#f2d27b" stroke-width="5" stroke-linecap="round"/>
  <path d="M137 322h46" stroke="#caa24a" stroke-width="4" stroke-linecap="round" opacity=".75"/>
  <text x="170" y="352" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="22" fill="#f2d27b">3D</text>
  <!-- arms -->
  <path d="M80 285c-34 40-44 88-31 145" stroke="#090909" stroke-width="28" stroke-linecap="round"/>
  <path d="M260 285c34 40 44 88 31 145" stroke="#090909" stroke-width="28" stroke-linecap="round"/>
  <circle cx="49" cy="435" r="19" fill="#0b0b0b" stroke="url(#gold)" stroke-width="4"/>
  <circle cx="291" cy="435" r="19" fill="#0b0b0b" stroke="url(#gold)" stroke-width="4"/>
  <path d="M62 456c18 16 38 16 58 0" stroke="url(#gold)" stroke-width="6" stroke-linecap="round"/>
  <path d="M278 456c-18 16-38 16-58 0" stroke="url(#gold)" stroke-width="6" stroke-linecap="round"/>
  <!-- base -->
  <path d="M104 500h132l-22 72h-88Z" fill="#080808" stroke="url(#gold)" stroke-width="4"/>
  <path d="M114 572h112c14 0 25 10 25 23H89c0-13 11-23 25-23Z" fill="#050505" stroke="#2b2b2b" stroke-width="3"/>
</g>
</svg>