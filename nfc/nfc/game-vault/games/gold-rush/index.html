<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gold Rush</title>
  <link rel="stylesheet" href="../../styles.css">
</head>
<body class="game-page">
  <div class="wrap">
    <div class="topbar">
      <a class="btn" href="../../index.html">Back To Game Vault</a>
      <a class="btn" href="../../../index.html?v=4">Back To Vault</a>
    </div>
    <section class="hero">
      <div class="eyebrow">Arcade</div>
      <h1>Gold Rush</h1>
      <p>Move the catcher, stack gold, dodge dead drops. Bonus mode adds a higher score target and better reward.</p>
    </section>
    <section class="game-shell">
      <div class="scorebar">
        <div class="pill">Score: <span id="score" style="margin-left:8px">0</span></div>
        <div class="pill">Target: <span id="target" style="margin-left:8px">10</span></div>
      </div>
      <canvas id="game" width="900" height="460"></canvas>
      <p class="status" id="status" style="margin-top:12px">Catch gold circles. Avoid red dead drops.</p>
      <div class="actions">
        <button class="btn gold" id="startBtn" type="button">Start</button>
        <button class="btn hidden" id="restartBtn" type="button">Restart</button>
      </div>
    </section>
  </div>
  <script src="../../shared.js"></script>
  <script>
    const bonus = GV.isBonus();
    const target = bonus ? 15 : 10;
    document.getElementById('target').textContent = target;
    const cvs = document.getElementById('game');
    const ctx = cvs.getContext('2d');
    const scoreEl = document.getElementById('score');
    const statusEl = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');

    let catcher = { x: 390, y: 408, w: 120, h: 18 };
    let drops = [];
    let score = 0;
    let running = false;
    let raf = 0;
    let spawnTick = 0;

    function reset(){
      catcher.x = 390;
      drops = [];
      score = 0;
      spawnTick = 0;
      scoreEl.textContent = '0';
      statusEl.textContent = 'Catch gold circles. Avoid red dead drops.';
      draw();
    }

    function spawn(){
      const bad = Math.random() < 0.28;
      drops.push({
        x: Math.random() * (cvs.width - 28) + 14,
        y: -20,
        r: bad ? 10 : 12,
        bad,
        speed: bad ? 4.0 : 3.2
      });
    }

    function draw(){
      ctx.clearRect(0,0,cvs.width,cvs.height);
      // bg glow
      const g = ctx.createLinearGradient(0,0,0,cvs.height);
      g.addColorStop(0,'rgba(20,20,20,0.2)');
      g.addColorStop(1,'rgba(0,0,0,0.45)');
      ctx.fillStyle = g;
      ctx.fillRect(0,0,cvs.width,cvs.height);

      ctx.fillStyle = 'rgba(210,167,79,0.18)';
      ctx.beginPath(); ctx.ellipse(cvs.width/2, cvs.height-30, 190, 28, 0, 0, Math.PI*2); ctx.fill();

      // catcher
      ctx.fillStyle = '#d2a74f';
      ctx.fillRect(catcher.x, catcher.y, catcher.w, catcher.h);

      for (const d of drops){
        ctx.beginPath();
        ctx.fillStyle = d.bad ? '#8c1e1e' : '#d2a74f';
        ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
        ctx.fill();
      }
    }

    function update(){
      if (!running) return;
      spawnTick++;
      if (spawnTick % 22 === 0) spawn();

      for (const d of drops){
        d.y += d.speed;
      }

      for (let i=drops.length-1;i>=0;i--){
        const d = drops[i];
        const caught = d.y + d.r >= catcher.y && d.y - d.r <= catcher.y + catcher.h && d.x >= catcher.x && d.x <= catcher.x + catcher.w;
        if (caught){
          if (d.bad){
            running = false;
            cancelAnimationFrame(raf);
            statusEl.textContent = 'Dead drop caught. Run over.';
            restartBtn.classList.remove('hidden');
            startBtn.classList.add('hidden');
            draw();
            return;
          } else {
            score++;
            scoreEl.textContent = String(score);
            drops.splice(i,1);
            if (score >= target){
              running = false;
              cancelAnimationFrame(raf);
              GV.setReward('goldrush', bonus ? 'bonus' : 'core');
              statusEl.textContent = bonus ? 'Target hit. Bonus gold reward unlocked.' : 'Target hit. Core gold reward unlocked.';
              restartBtn.classList.remove('hidden');
              startBtn.classList.add('hidden');
              draw();
              return;
            }
          }
        } else if (d.y - d.r > cvs.height){
          drops.splice(i,1);
        }
      }

      draw();
      raf = requestAnimationFrame(update);
    }

    function setCatcher(clientX){
      const rect = cvs.getBoundingClientRect();
      const x = (clientX - rect.left) * (cvs.width / rect.width);
      catcher.x = Math.max(0, Math.min(cvs.width - catcher.w, x - catcher.w/2));
    }

    cvs.addEventListener('mousemove', e => setCatcher(e.clientX));
    cvs.addEventListener('touchmove', e => { setCatcher(e.touches[0].clientX); }, {passive:true});

    startBtn.addEventListener('click', () => {
      reset();
      running = true;
      startBtn.classList.add('hidden');
      restartBtn.classList.add('hidden');
      raf = requestAnimationFrame(update);
    });

    restartBtn.addEventListener('click', () => {
      startBtn.classList.remove('hidden');
      restartBtn.classList.add('hidden');
      reset();
    });

    reset();
  </script>
</body>
</html>
