<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Exclusive Room</title>
  <link rel="stylesheet" href="./nfc.css">
  <link rel="stylesheet" href="./vault-polish.css">
  <style>
    body{
      background:
        linear-gradient(180deg, rgba(0,0,0,.20), rgba(0,0,0,.20)),
        url("./assets/secret_page_backdrop.jpg") center/cover fixed no-repeat;
    }
    .page-wrap{width:min(1180px,92vw);margin:0 auto;padding:18px 0 56px}
    .page-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    @media (max-width:980px){.page-grid{grid-template-columns:1fr}}
  </style>

  <script src="/public/shared/config.js"></script>
  <script src="/public/shared/pass-session.js"></script>
  <script>
    (function(){
      if(!window.Play3DPassSession){
        location.replace('/public/redeem/');
        return;
      }
      const pass = Play3DPassSession.current();
      if(!pass){
        location.replace('/public/redeem/');
      }
    })();
  </script>

</head>
<body class="room-cinematic room-secret">
  <div class="noise"></div>
  <div class="page-wrap">
    <header class="topbar">
      <a class="logo-link" href="./index.html"><img class="logo" src="./assets/vault_stamp_gold.png" alt="Vault Seal"></a>
      <a class="back-btn" href="./index.html">Back To Vault</a>
    </header>
    <section class="page-card" style="padding:22px">
      <div class="eyebrow">Hidden Chamber</div>
      <h1>Exclusive Room</h1>
      <p>This chamber is reserved for special drops, hidden media, and deeper vault rewards.</p>
      <div class="action-row" style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap">
        <a class="btn gold" href="https://youtube.com/@iiidtv">Watch Channel</a>
        <a class="btn" href="./index.html">Back To Vault</a>
      </div>
    </section>
    <section class="page-grid">
      <div class="page-card" style="padding:18px"><h3>Music</h3><p>Place exclusive records, hidden tracks, or private audio here.</p></div>
      <div class="page-card" style="padding:18px"><h3>Video</h3><p>Use this room for deeper visual drops and secret content.</p></div>
    </section>
  </div>
</body>
</html>
