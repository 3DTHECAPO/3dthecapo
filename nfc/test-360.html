<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{background:#000;color:#fff;text-align:center;font-family:Arial}
.viewer{width:300px;height:300px;margin:50px auto}
img{width:100%;height:auto}
</style>
</head>
<body>

<h2>360 TEST ITEM</h2>
<div class="viewer">
<img id="spin">
</div>

<script>
let frames=[];
for(let i=1;i<=24;i++){
  frames.push("./assets/spins/hoodie/frame_"+String(i).padStart(2,'0')+".png");
}

let img=document.getElementById("spin");
let index=0;

setInterval(()=>{
  index=(index+1)%frames.length;
  img.src=frames[index];
},100);
</script>

</body>
</html>
