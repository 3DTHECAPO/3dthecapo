<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3D THE CAPO — Vault</title>
<link rel="stylesheet" href="./capo-guide.css">
<style>
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  background:#050403;
  color:#fff;
  font-family:Arial,Helvetica,sans-serif;
}
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px 18px;
  background:radial-gradient(circle at center,rgba(244,198,111,.14),transparent 42%),#050403;
}
.card{
  width:min(760px,94vw);
  border:1px solid rgba(244,198,111,.32);
  border-radius:18px;
  padding:34px 22px;
  background:rgba(255,255,255,.035);
  box-shadow:0 24px 70px rgba(0,0,0,.45);
}
h1{
  margin:0 0 12px;
  color:#f4c66f;
  letter-spacing:.12em;
}
p{color:#ddd;line-height:1.5}
.grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:12px;
  margin-top:24px;
}
.tile{
  border:1px solid rgba(244,198,111,.22);
  border-radius:12px;
  padding:18px;
  background:#0e0b08;
}
@media(max-width:620px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class="hero">
  <section class="card">
    <h1>VAULT UNLOCKED</h1>
    <p>This is the unlocked vault interface only. Replace this content with your real vault room, drops, rewards, music, or game links.</p>
    <div class="grid">
      <div class="tile"><strong>Exclusive Drop</strong><br><small>Member content area</small></div>
      <div class="tile"><strong>Game Vault</strong><br><small>Private game access</small></div>
      <div class="tile"><strong>Rewards</strong><br><small>Claim center</small></div>
      <div class="tile"><strong>Museum</strong><br><small>Vault exhibit</small></div>
    </div>
  </section>
</main>
<script src="./capo-guide.js"></script>
</body>
</html>
