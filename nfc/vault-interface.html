<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vault Interface</title>
  <link rel="stylesheet" href="./nfc.css">
  <link rel="stylesheet" href="./vault-polish.css">
  <style>
    body{
      background:
        linear-gradient(180deg, rgba(0,0,0,.20), rgba(0,0,0,.20)),
        url("./assets/vault_interface.jpg") center/cover fixed no-repeat;
    }
    .page-wrap{width:min(1180px,92vw);margin:0 auto;padding:18px 0 56px}
    .page-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .product-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    @media (max-width:980px){.page-grid,.product-grid{grid-template-columns:1fr}}
  </style>

  <script src="./shared/access-bridge.js"></script>
  <script>
    (function(){
      if(window.Play3DAccess && window.Play3DAccess.requireTier('gold',{redirect:true})) return;
    })();
  </script>

</head>
<body class="room-cinematic room-interface">
  <div class="noise"></div>
  <div class="page-wrap">
    <header class="topbar">
      <a class="logo-link" href="./index.html"><img class="logo" src="./assets/vault_stamp_gold.png" alt="Vault Seal"></a>
      <div class="action-row" style="gap:10px;flex-wrap:wrap">
        <a class="back-btn" href="./index.html">Back To Vault</a>
        <a class="back-btn" href="../index.html">Main Site</a>
        <a class="back-btn" href="./game-vault/index.html">Game Vault</a>
      </div>
    </header>
    <section class="page-card" style="padding:22px">
      <div class="eyebrow">Gold Control</div>
      <h1>Vault Interface</h1>
      <p>This room serves as a premium access lane for private navigation, coded entry, and deeper vault routes.</p>
      <div class="action-row" style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap"><a class="btn gold" href="./scan.html">Open Scan Page</a></div>
    </section>
    
  </div>
</body>
</html>
