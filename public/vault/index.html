<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Redirecting To Vault</title>
  <meta name="robots" content="noindex">

  <style>
    html,body{
      margin:0;
      width:100%;
      height:100%;
      background:#000;
      color:#d2a74f;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:Arial,sans-serif;
      overflow:hidden;
    }

    .wrap{
      text-align:center;
      padding:24px;
    }

    .ring{
      width:90px;
      height:90px;
      margin:0 auto 20px;
      border-radius:50%;
      border:3px solid rgba(210,167,79,.18);
      border-top-color:#d2a74f;
      animation:spin 1s linear infinite;
      box-shadow:0 0 24px rgba(210,167,79,.25);
    }

    h1{
      margin:0 0 10px;
      font-size:20px;
      letter-spacing:2px;
      text-transform:uppercase;
    }

    p{
      margin:0;
      opacity:.72;
    }

    @keyframes spin{
      to{transform:rotate(360deg)}
    }
  </style>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const code = (params.get("code") || "").trim();

      const target = code
        ? "/nfc/scan.html?code=" + encodeURIComponent(code)
        : "/nfc/vault-interface.html";

      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <div class="wrap">
    <div class="ring"></div>
    <h1>Redirecting To Vault</h1>
    <p>Loading secure access...</p>
  </div>
</body>
</html>
