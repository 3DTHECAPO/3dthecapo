<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>3D THE CAPO • Redeem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/styles.css">
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px;">
        <a class="back" href="/nfc/index.html" aria-label="Back">←</a>
        <div>
          <div class="kicker">3D THE CAPO</div>
          <div class="title">Secure Code Redeem</div>
        </div>
      </div>
      <a class="btn-link" href="/index.html">MAIN SITE</a>
    </div>

    <section class="card">
      <div class="hero">
        <div class="hero-title">Code Router</div>
        <div class="hero-sub">ENTER OR OPEN A CODE LINK</div>
      </div>

      <div class="input-wrap">
        <label for="codeInput">Redeem Code</label>
        <input id="codeInput" placeholder="ENTRY / GOLD / ELITE / BOOST / MEMBER / VIP">
        <button id="redeemBtn" type="button">Redeem</button>
      </div>

      <div class="status">
        <div class="status-kicker">Status</div>
        <div class="status-text ok" id="statusText">READY</div>
        <div class="status-sub" id="statusSub">Access codes open the vault. Credit codes open the credit claim flow.</div>
      </div>

      <div class="pass-box" id="passBox" style="display:none">
        <div class="status-kicker">Pass Saved</div>
        <div class="pass-row"><span>Tier</span><strong id="passTier">-</strong></div>
        <div class="pass-row"><span>Expires</span><strong id="passExpiry">-</strong></div>
      </div>
    </section>
  </main>

  <script src="../shared/config.js"></script>
  <script src="../shared/pass-session.js"></script>
  <script src="../shared/secure-redeem.js"></script>
  <script>
    const codeInput = document.getElementById("codeInput");
    const statusText = document.getElementById("statusText");
    const statusSub = document.getElementById("statusSub");
    const btn = document.getElementById("redeemBtn");
    const passBox = document.getElementById("passBox");
    const passTier = document.getElementById("passTier");
    const passExpiry = document.getElementById("passExpiry");

    function normalizeCode(value){
      return String(value || "").trim().toUpperCase();
    }

    function isCreditCode(code){
      return /^(BOOST|MEMBER|VIP)-\d+-[A-Z0-9]+$/.test(code);
    }

    function routeCreditCode(code){
      statusText.textContent = "CREDIT CODE FOUND";
      statusText.className = "status-text ok";
      statusSub.textContent = "Opening the credit claim flow...";
      window.location.replace("/nfc/game-vault/claim/index.html?code=" + encodeURIComponent(code) + "&auto=1");
    }

    const existing = window.Play3DPassSession && Play3DPassSession.current();
    if(existing){
      passBox.style.display = "block";
      passTier.textContent = existing.tier;
      passExpiry.textContent = Play3DPassSession.formatExpiry(existing);
    }

    async function handleRedeem(){
      const code = normalizeCode(codeInput.value);
      if(!code){
        statusText.textContent = "NO CODE ENTERED";
        statusText.className = "status-text bad";
        statusSub.textContent = "Enter a code to continue.";
        return;
      }

      if(isCreditCode(code)){
        routeCreditCode(code);
        return;
      }

      statusText.textContent = "CHECKING ACCESS CODE";
      statusText.className = "status-text ok";
      statusSub.textContent = "Validating and securing access...";
      try{
        const result = await Play3DSecureRedeem.redeemCode(code);
        if(!result.ok){
          const [title, sub] = Play3DSecureRedeem.statusMessage(result.reason);
          statusText.textContent = title;
          statusText.className = "status-text bad";
          statusSub.textContent = sub;
          return;
        }
        statusText.textContent = "ACCESS GRANTED";
        statusText.className = "status-text ok";
        statusSub.textContent = "Pass saved. Opening the cinematic...";
        if(result.pass){
          passBox.style.display = "block";
          passTier.textContent = result.pass.tier;
          passExpiry.textContent = Play3DPassSession.formatExpiry(result.pass);
        }
        window.location.replace("/nfc/index.html?code=" + encodeURIComponent(code) + "&play=1");
      }catch(e){
        statusText.textContent = "SYSTEM ERROR";
        statusText.className = "status-text bad";
        statusSub.textContent = "Check your Supabase connection and try again.";
      }
    }

    btn.addEventListener("click", handleRedeem);
    codeInput.addEventListener("keydown", e => {
      if(e.key === "Enter") handleRedeem();
    });

    const suppliedCode = normalizeCode(new URLSearchParams(window.location.search).get("code"));
    if(suppliedCode){
      codeInput.value = suppliedCode;
      setTimeout(handleRedeem, 80);
    }
  </script>
</body>
</html>
