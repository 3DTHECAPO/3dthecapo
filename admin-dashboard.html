<!doctype html>
<html>
<head>
  <title>PLAY 3D ADMIN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background:#050505;
      color:#f4f1ea;
      font-family:Arial;
      padding:20px;
    }

    h1 { color:#f2d27b; }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:12px;
      margin-bottom:20px;
    }

    .card {
      background:#0c0c0c;
      border:1px solid rgba(202,162,74,.3);
      padding:16px;
      border-radius:12px;
      text-align:center;
    }

    button {
      background:#caa24a;
      border:none;
      padding:10px;
      margin:5px;
      cursor:pointer;
      font-weight:bold;
    }

    table {
      width:100%;
      border-collapse:collapse;
      margin-top:20px;
    }

    td, th {
      border:1px solid rgba(255,255,255,.1);
      padding:8px;
      font-size:12px;
    }
  </style>
</head>
<body>

<h1>PLAY 3D ADMIN</h1>

<button onclick="loadData()">REFRESH</button>

<div class="grid">
  <div class="card">ENTRY LEFT<br><span id="entry">-</span></div>
  <div class="card">GOLD LEFT<br><span id="gold">-</span></div>
  <div class="card">ELITE LEFT<br><span id="elite">-</span></div>
  <div class="card">EMAILS<br><span id="emails">-</span></div>
  <div class="card">SENT<br><span id="sent">-</span></div>
  <div class="card">DUPES BLOCKED<br><span id="dupes">-</span></div>
</div>

<h2>ADMIN SEND CODE</h2>

<input id="adminEmail" placeholder="email">
<select id="type">
  <option>ENTRY</option>
  <option>GOLD</option>
  <option>ELITE</option>
</select>

<button onclick="sendCode()">SEND CODE</button>

<h2>CLAIM LOG</h2>

<table id="log">
  <thead>
    <tr>
      <th>Email</th>
      <th>Code</th>
      <th>Type</th>
      <th>Time</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const SUPABASE_URL = "https://fupoedrovfloudefyzna.supabase.co";
const SERVICE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1cG9lZHJvdmZsb3VkZWZ5em5hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NzU2NjEsImV4cCI6MjA5MjM1MTY2MX0.CGgOxXXSXWMjNPcnQR_zMBHk8WkWSb0lhcNlTfCR4xo"; // replace

async function loadData() {

  // INVENTORY
  const res = await fetch(`${SUPABASE_URL}/rest/v1/vault_codes?select=*`, {
    headers: {
      apikey: SERVICE_KEY,
      Authorization: "Bearer " + SERVICE_KEY
    }
  });

  const data = await res.json();

  document.getElementById("entry").innerText =
    data.filter(x=>x.code_type==="ENTRY" && !x.sent).length;

  document.getElementById("gold").innerText =
    data.filter(x=>x.code_type==="GOLD" && !x.sent).length;

  document.getElementById("elite").innerText =
    data.filter(x=>x.code_type==="ELITE" && !x.sent).length;

  document.getElementById("sent").innerText =
    data.filter(x=>x.sent).length;

  document.getElementById("emails").innerText =
    [...new Set(data.map(x=>x.recipient_email).filter(Boolean))].length;

  // LOG
  const tbody = document.querySelector("#log tbody");
  tbody.innerHTML = "";

  data
    .filter(x=>x.sent)
    .slice(-20)
    .reverse()
    .forEach(row=>{
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${row.recipient_email||""}</td>
        <td>${row.code}</td>
        <td>${row.code_type}</td>
        <td>${row.sent_at||""}</td>
      `;
      tbody.appendChild(tr);
    });
}

async function sendCode(){
  const email = document.getElementById("adminEmail").value;
  const type = document.getElementById("type").value;

  const res = await fetch(`${SUPABASE_URL}/functions/v1/dynamic-endpoint`, {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + SERVICE_KEY
    },
    body:JSON.stringify({ email, force:true, type })
  });

  alert("Sent");
}

loadData();
</script>

</body>
</html>
